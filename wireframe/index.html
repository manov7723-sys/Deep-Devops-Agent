<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeepAgent — UI (single-file SPA)</title>
  <style>
/* ============================================================
 * tokens.css — DeepAgent design tokens (ported verbatim from wireframe)
 * Dark default, light supported, accent + density tweakable.
 * Do not edit values without updating the wireframe parity log.
 * ============================================================ */

:root {
  /* Accent (tweakable) — violet by default */
  --accent-h: 285;
  --accent-c: 0.17;
  --accent: oklch(0.62 var(--accent-c) var(--accent-h));
  --accent-strong: oklch(0.56 var(--accent-c) var(--accent-h));
  --accent-soft: oklch(0.62 var(--accent-c) var(--accent-h) / 0.14);
  --accent-line: oklch(0.62 var(--accent-c) var(--accent-h) / 0.34);
  --accent-fg: oklch(0.99 0 0);

  /* Status */
  --ok: oklch(0.74 0.15 158);
  --ok-soft: oklch(0.74 0.15 158 / 0.14);
  --warn: oklch(0.8 0.14 78);
  --warn-soft: oklch(0.8 0.14 78 / 0.15);
  --danger: oklch(0.66 0.2 22);
  --danger-soft: oklch(0.66 0.2 22 / 0.15);
  --info: oklch(0.72 0.13 235);
  --info-soft: oklch(0.72 0.13 235 / 0.15);

  /* Density (tweakable): comfortable default */
  --density: 1;
  --u: calc(4px * var(--density));
  --row-h: calc(40px * var(--density));
  --pad-card: calc(20px * var(--density));

  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 18px;
  --radius-pill: 999px;

  --font-ui: "Plus Jakarta Sans", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
  --shadow: 0 8px 24px -8px oklch(0 0 0 / 0.45);
  --shadow-lg: 0 24px 60px -20px oklch(0 0 0 / 0.6);
  --ring: 0 0 0 3px var(--accent-soft);
}

/* ---------- DARK (default) ---------- */
:root,
[data-theme="dark"] {
  --bg: oklch(0.17 0.012 274);
  --bg-grad:
    radial-gradient(1200px 700px at 80% -10%, oklch(0.62 0.1 285 / 0.1), transparent 60%), var(--bg);
  --surface: oklch(0.205 0.013 274);
  --surface-2: oklch(0.245 0.014 274);
  --surface-3: oklch(0.285 0.015 274);
  --border: oklch(0.32 0.013 274);
  --border-soft: oklch(0.27 0.012 274);
  --text: oklch(0.96 0.005 274);
  --text-muted: oklch(0.72 0.012 274);
  --text-faint: oklch(0.56 0.012 274);
  --overlay: oklch(0.1 0.01 274 / 0.62);
}

/* ---------- LIGHT ---------- */
[data-theme="light"] {
  --bg: oklch(0.975 0.004 274);
  --bg-grad:
    radial-gradient(1200px 700px at 80% -10%, oklch(0.62 0.12 285 / 0.08), transparent 60%),
    var(--bg);
  --surface: oklch(1 0 0);
  --surface-2: oklch(0.975 0.005 274);
  --surface-3: oklch(0.945 0.006 274);
  --border: oklch(0.9 0.006 274);
  --border-soft: oklch(0.93 0.005 274);
  --text: oklch(0.24 0.015 274);
  --text-muted: oklch(0.48 0.014 274);
  --text-faint: oklch(0.62 0.012 274);
  --overlay: oklch(0.3 0.02 274 / 0.35);
  --shadow-sm: 0 1px 2px oklch(0.3 0.02 274 / 0.08);
  --shadow: 0 10px 30px -12px oklch(0.3 0.02 274 / 0.18);
  --shadow-lg: 0 30px 70px -24px oklch(0.3 0.02 274 / 0.22);
  --accent-fg: oklch(0.99 0 0);
}

/* ============================================================
 * primitives.css — DeepAgent design system primitives.
 * .card .btn .badge .dot .input .toggle .tabs .prog .skel and friends.
 * Class names match the wireframe so React primitives stay minimal.
 * ============================================================ */

* {
  box-sizing: border-box;
}
html,
body {
  margin: 0;
  padding: 0;
  height: 100%;
}
body {
  font-family: var(--font-ui);
  background: var(--bg-grad);
  background-attachment: fixed;
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection {
  background: var(--accent-soft);
}

/* scrollbars */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
*::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
*::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 99px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
*::-webkit-scrollbar-thumb:hover {
  background: var(--surface-3);
}

h1,
h2,
h3,
h4,
h5 {
  margin: 0;
  font-weight: 700;
  letter-spacing: -0.015em;
  line-height: 1.2;
}
p {
  margin: 0;
}
a {
  color: inherit;
  text-decoration: none;
}
button {
  font-family: inherit;
}
.mono {
  font-family: var(--font-mono);
  font-feature-settings: "ss01";
}

/* ---------- utility ---------- */
.muted {
  color: var(--text-muted);
}
.faint {
  color: var(--text-faint);
}
.row {
  display: flex;
  align-items: center;
}
.col {
  display: flex;
  flex-direction: column;
}
.gap-1 {
  gap: 4px;
}
.gap-2 {
  gap: 8px;
}
.gap-3 {
  gap: 12px;
}
.gap-4 {
  gap: 16px;
}
.gap-5 {
  gap: 20px;
}
.gap-6 {
  gap: 24px;
}
.grow {
  flex: 1;
}
.wrap {
  flex-wrap: wrap;
}
.center {
  align-items: center;
  justify-content: center;
}
.between {
  justify-content: space-between;
}
.tnum {
  font-variant-numeric: tabular-nums;
}
.nowrap {
  white-space: nowrap;
}
.tx-pretty {
  text-wrap: pretty;
}
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* ---------- card / block ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.card-pad {
  padding: var(--pad-card);
}
.card-h {
  padding: 16px var(--pad-card);
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-title {
  font-size: 13.5px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.card-toolbar {
  padding: 12px var(--pad-card);
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

/* ---------- button ---------- */
.btn {
  --h: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: var(--h);
  padding: 0 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition:
    background 0.14s,
    border-color 0.14s,
    transform 0.06s,
    box-shadow 0.14s,
    color 0.14s;
  user-select: none;
}
.btn:hover {
  background: var(--surface-3);
  border-color: var(--surface-3);
}
.btn:active {
  transform: translateY(1px);
}
.btn svg {
  width: 16px;
  height: 16px;
}
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-fg);
}
.btn.primary:hover {
  background: var(--accent-strong);
  border-color: var(--accent-strong);
}
.btn.ghost {
  background: transparent;
  border-color: transparent;
}
.btn.ghost:hover {
  background: var(--surface-2);
}
.btn.outline {
  background: transparent;
}
.btn.outline:hover {
  background: var(--surface-2);
}
.btn.danger {
  background: var(--danger-soft);
  border-color: transparent;
  color: var(--danger);
}
.btn.danger:hover {
  background: var(--danger);
  color: white;
}
.btn.sm {
  --h: 30px;
  padding: 0 10px;
  font-size: 12px;
}
.btn.lg {
  --h: 44px;
  padding: 0 20px;
  font-size: 14px;
}
.btn.icon {
  padding: 0;
  width: var(--h);
}
.btn.block {
  width: 100%;
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.btn:focus-visible {
  outline: none;
  box-shadow: var(--ring);
}

/* ---------- input ---------- */
.input,
.select,
.textarea {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
  transition:
    border-color 0.14s,
    box-shadow 0.14s,
    background 0.14s;
}
.textarea {
  height: auto;
  padding: 10px 12px;
  resize: vertical;
  line-height: 1.5;
}
.input::placeholder,
.textarea::placeholder {
  color: var(--text-faint);
}
.input:focus,
.select:focus,
.textarea:focus {
  outline: none;
  border-color: var(--accent-line);
  box-shadow: var(--ring);
}
.field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  display: block;
}

/* ---------- badge / pill ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 22px;
  padding: 0 9px;
  border-radius: var(--radius-pill);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  white-space: nowrap;
}
.badge.ok {
  background: var(--ok-soft);
  color: var(--ok);
  border-color: transparent;
}
.badge.warn {
  background: var(--warn-soft);
  color: var(--warn);
  border-color: transparent;
}
.badge.danger {
  background: var(--danger-soft);
  color: var(--danger);
  border-color: transparent;
}
.badge.info {
  background: var(--info-soft);
  color: var(--info);
  border-color: transparent;
}
.badge.accent {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: transparent;
}
.badge.solid-ok {
  background: var(--ok);
  color: #04210f;
  border-color: transparent;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 99px;
  background: var(--text-faint);
  flex: none;
}
.dot.ok {
  background: var(--ok);
  box-shadow: 0 0 0 3px var(--ok-soft);
}
.dot.warn {
  background: var(--warn);
  box-shadow: 0 0 0 3px var(--warn-soft);
}
.dot.danger {
  background: var(--danger);
  box-shadow: 0 0 0 3px var(--danger-soft);
}
.dot.info {
  background: var(--info);
  box-shadow: 0 0 0 3px var(--info-soft);
}
.dot.pulse {
  animation: pulse 1.8s infinite;
}
@keyframes pulse {
  0%,
  100% {
    opacity: 1;
  }
  50% {
    opacity: 0.35;
  }
}

/* ---------- table ---------- */
.tbl {
  width: 100%;
  border-collapse: collapse;
}
.tbl th {
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-faint);
  font-weight: 700;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-soft);
}
.tbl td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-soft);
  font-size: 13px;
}
.tbl tbody tr {
  transition: background 0.12s;
}
.tbl tbody tr:hover {
  background: var(--surface-2);
}
.tbl tbody tr:last-child td {
  border-bottom: none;
}

/* ---------- tabs ---------- */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
  transition:
    color 0.12s,
    border-color 0.12s;
  background: transparent;
  border-left: none;
  border-right: none;
  border-top: none;
}
.tab:hover {
  color: var(--text);
}
.tab.active,
.tab[data-state="active"] {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* ---------- toggle (visual) ---------- */
.toggle {
  width: 38px;
  height: 22px;
  border-radius: 99px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  flex: none;
  transition: background 0.16s;
}
.toggle::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  border-radius: 99px;
  background: var(--text-muted);
  transition:
    transform 0.16s,
    background 0.16s;
}
.toggle.on,
.toggle[data-state="checked"] {
  background: var(--accent);
  border-color: var(--accent);
}
.toggle.on::after,
.toggle[data-state="checked"]::after {
  transform: translateX(16px);
  background: white;
}

/* ---------- progress ---------- */
.prog {
  height: 6px;
  border-radius: 99px;
  background: var(--surface-3);
  overflow: hidden;
}
.prog > i {
  display: block;
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.4s;
}
.prog.ok > i {
  background: var(--ok);
}
.prog.warn > i {
  background: var(--warn);
}
.prog.danger > i {
  background: var(--danger);
}

/* ---------- misc ---------- */
.kbd {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 5px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.divider {
  height: 1px;
  background: var(--border-soft);
}
.vdivider {
  width: 1px;
  background: var(--border-soft);
  align-self: stretch;
}
.avatar {
  border-radius: 99px;
  object-fit: cover;
  background: var(--surface-3);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: var(--accent-fg);
  flex: none;
  overflow: hidden;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 28px;
  padding: 0 10px;
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
}
.chip:hover {
  color: var(--text);
  border-color: var(--surface-3);
}
.chip.active {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: var(--accent-line);
}

.skel {
  background: linear-gradient(90deg, var(--surface-2), var(--surface-3), var(--surface-2));
  background-size: 200% 100%;
  animation: skel 1.4s infinite;
  border-radius: 6px;
}
@keyframes skel {
  0% {
    background-position: 200% 0;
  }
  100% {
    background-position: -200% 0;
  }
}

.fade-in {
  animation: fadeIn 0.32s ease;
}
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}
.pop-in {
  animation: popIn 0.18s ease;
}
@keyframes popIn {
  from {
    opacity: 0;
    transform: scale(0.97) translateY(4px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

/* --- Modal entrance + exit (Radix Dialog content) ---------------- */
.modal-content[data-state="open"] {
  animation: modalIn 0.26s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal-content[data-state="closed"] {
  animation: modalOut 0.16s cubic-bezier(0.4, 0, 1, 1);
}
@keyframes modalIn {
  from {
    opacity: 0;
    transform: translate(-50%, calc(-50% + 12px)) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}
@keyframes modalOut {
  from {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  to {
    opacity: 0;
    transform: translate(-50%, calc(-50% + 8px)) scale(0.98);
  }
}

.modal-backdrop[data-state="open"] {
  animation: backdropIn 0.22s ease-out;
}
.modal-backdrop[data-state="closed"] {
  animation: backdropOut 0.16s ease-in;
}
@keyframes backdropIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}
@keyframes backdropOut {
  from {
    opacity: 1;
  }
  to {
    opacity: 0;
  }
}

@media (prefers-reduced-motion: reduce) {
  .modal-content[data-state="open"],
  .modal-content[data-state="closed"],
  .modal-backdrop[data-state="open"],
  .modal-backdrop[data-state="closed"] {
    animation: none;
  }
}
.spin {
  animation: spin 1.1s linear infinite;
}
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* placeholder image */
.ph {
  background-image: repeating-linear-gradient(
    45deg,
    var(--surface-2),
    var(--surface-2) 10px,
    var(--surface-3) 10px,
    var(--surface-3) 20px
  );
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
  font-family: var(--font-mono);
  font-size: 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

/* ---------- Radix overlay (modal backdrop) ---------- */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(3px);
}

.dda-proj-dash-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 14px;
}
@media (max-width: 1000px) {
  .dda-proj-dash-grid {
    grid-template-columns: 1fr;
  }
}

.dda-approvals-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 1.3fr;
  gap: 14px;
  align-items: start;
}
@media (max-width: 1000px) {
  .dda-approvals-grid {
    grid-template-columns: 1fr;
  }
}

/* ---------- Agent rows + envvar masks (Phase 9) ---------- */
.dda-agent-tile {
  width: 44px;
  height: 44px;
  border-radius: 11px;
  background: var(--surface-2);
  color: var(--text-faint);
  flex: none;
}
.dda-agent-tile[data-on="true"] {
  background: var(--accent-soft);
  color: var(--accent);
}

.dda-envvar-mask {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}

.dda-brand-asset {
  width: 64px;
  height: 40px;
  border-radius: var(--radius-sm);
  flex: none;
}

.dda-email-ok-banner {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 12px;
  border-radius: 10px;
  background: var(--ok-soft);
  color: var(--ok);
  font-size: 13px;
}

/* ---------- MCP + admin tables (Phase 8) ---------- */
.dda-mcp-row {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border-soft);
}
.dda-mcp-row:last-child {
  border-bottom: none;
}
.dda-mcp-tile {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  color: var(--text-muted);
  flex: none;
}

.dda-row-expanded > td {
  background: var(--surface-2);
}
.dda-admin-addon-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px 10px 30px;
  border-top: 1px solid var(--border-soft);
}
.dda-admin-addon-row:first-child {
  border-top: none;
}
.dda-admin-addon-tile {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: var(--surface);
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: none;
}

/* ---------- Knowledge + approvals + alerts + danger zone (Phase 7) ---------- */
.dda-search-input {
  height: 36px;
  padding: 0 12px;
  border-radius: 9px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-faint);
  max-width: 100%;
}
.dda-search-input input {
  border: none;
  background: transparent;
  outline: none;
  color: var(--text);
  font-size: 13px;
  width: 100%;
  font-family: inherit;
}

.dda-kb-card {
  cursor: pointer;
  transition:
    border-color 0.14s,
    box-shadow 0.14s;
}
.dda-kb-card:hover {
  border-color: var(--accent-line);
  box-shadow: var(--shadow);
}
.dda-kb-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--surface-2);
  flex: none;
}
.dda-kb-mark {
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 3px;
  padding: 0 2px;
}

.dda-approval-row {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;
  background: transparent;
  border-left: 2px solid transparent;
  border-top: none;
  border-right: none;
  width: 100%;
  color: inherit;
  font-family: inherit;
  transition: background 0.12s;
}
.dda-approval-row:hover {
  background: var(--surface-2);
}
.dda-approval-row[data-active="true"] {
  background: var(--surface-2);
  border-left-color: var(--accent);
}
.dda-approval-diff {
  background: var(--surface-2);
  border-radius: 10px;
  overflow: hidden;
  font-family: var(--font-mono);
}
.dda-approval-diff-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-soft);
}
.dda-approval-diff pre {
  margin: 0;
  padding: 12px 14px;
  font-size: 11.5px;
  line-height: 1.7;
  overflow-x: auto;
}

.dda-alert-card {
  transition: border-color 0.12s;
}
.dda-alert-icon {
  width: 42px;
  height: 42px;
  border-radius: 11px;
  flex: none;
}

.dda-danger-row {
  padding: 16px 18px;
  border-top: 1px solid var(--border-soft);
}
.dda-danger-row:first-child {
  border-top: none;
}
.dda-danger-card {
  border-color: var(--danger);
  overflow: hidden;
}

.dda-virtual-scroll {
  border-radius: var(--radius);
}

/* ---------- Cloud + tasks (Phase 6) ---------- */
.dda-provider-tile {
  width: 42px;
  height: 42px;
  border-radius: 11px;
  border: 1px solid var(--border);
  font-weight: 800;
  font-size: 11px;
  color: white;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
  flex: none;
  letter-spacing: 0.05em;
}

.dda-cloud-stat-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--accent);
  flex: none;
}
.dda-cloud-policy {
  padding: 10px 12px;
  background: var(--surface-2);
  border-radius: 9px;
  border: 1px solid var(--border-soft);
}

.dda-task-icon {
  width: 42px;
  height: 42px;
  border-radius: 11px;
  flex: none;
}

.dda-cost-trend {
  position: relative;
}
.dda-cost-budget-line {
  position: absolute;
  left: 0;
  right: 0;
  border-top: 1.5px dashed var(--warn);
  opacity: 0.7;
}

/* ---------- Pipeline + activity + chat (Phase 5) ---------- */
.dda-pipeline-stage {
  flex: 1 1 auto;
  min-width: 100px;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  align-items: center;
}

.dda-activity-row {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border-soft);
}
.dda-activity-row:last-child {
  border-bottom: none;
}

.dda-config-row {
  padding: 6px 0;
}

/* When a chat page is inside .dda-page-wrap, drop the wrap's padding entirely
   so the chat can fill 100% of .dda-main without any viewport math. Modern
   :has() gives us this per-route override without touching other pages.
   Matches through the .dda-chat-shell wrapper the threaded layout adds. */
.dda-main:has(.dda-chat-page) {
  overflow: hidden;
}
.dda-page-wrap:has(.dda-chat-page) {
  padding: 0;
  height: 100%;
  max-width: none;
  overflow: hidden;
}
.dda-chat-page {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
.dda-chat-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  flex: none;
  gap: 12px;
}
.dda-chat-head-icon {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  background: var(--accent-soft);
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.dda-chat-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.dda-chat-inner {
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 820px;
  margin: 0 auto;
}
.dda-chat-row {
  align-items: flex-start;
}
.dda-chat-user-bubble {
  padding: 11px 15px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  border-radius: 12px;
  max-width: 76%;
  font-size: 13.5px;
  line-height: 1.5;
}
.dda-chat-agent-tile {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--accent-soft);
  color: var(--accent);
  flex: none;
}
.dda-chat-agent-bubble {
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.55;
}
.dda-chat-plan-row {
  padding: 9px 10px;
  border-radius: 8px;
}
.dda-chat-plan-icon {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: var(--surface-2);
  color: var(--accent);
  flex: none;
}
.dda-chat-code {
  overflow: hidden;
  font-size: 12px;
}
.dda-chat-code-head {
  padding: 8px 12px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-soft);
}
.dda-chat-code-body {
  margin: 0;
  padding: 12px 14px;
  overflow-x: auto;
  line-height: 1.6;
  color: var(--text-muted);
  white-space: pre;
}
.dda-chat-composer {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px 12px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow-sm);
  transition:
    border-color 0.15s ease,
    box-shadow 0.15s ease;
}
.dda-chat-composer:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}
.dda-chat-composer-input {
  border: none;
  background: transparent;
  outline: none;
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  font-family: inherit;
  width: 100%;
  min-height: 24px;
  max-height: 200px;
  resize: none;
  overflow-y: hidden;
  padding: 4px 6px;
}
.dda-chat-composer-input::placeholder {
  color: var(--text-faint);
}
.dda-chat-composer-actions {
  align-items: center;
}

/* Chat page layout: main pane + right-side history rail. The rail collapses
   by animating grid-template-columns; the rail itself scales/fades so it
   doesn't reflow its content mid-transition. */
.dda-chat-shell {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 0;
  height: 100%;
  min-height: 0;
  overflow: hidden;
  transition: grid-template-columns 0.22s ease;
}
.dda-chat-shell.is-rail-closed {
  grid-template-columns: 1fr 0px;
}
.dda-chat-shell.is-rail-closed > .dda-chat-rail {
  opacity: 0;
  transform: translateX(12px);
  pointer-events: none;
}
.dda-chat-shell > .dda-chat-page {
  min-width: 0;
  min-height: 0;
}
.dda-chat-rail {
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border-soft);
  background: var(--surface-2);
  min-width: 0;
  min-height: 0;
  height: 100%;
  overflow: hidden;
  transition:
    opacity 0.18s ease,
    transform 0.22s ease;
}
.dda-chat-rail-scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.dda-chat-rail-heading {
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-faint);
  padding: 8px 8px 4px;
  margin: 0;
}
.dda-chat-rail-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition:
    background-color 0.12s ease,
    border-color 0.12s ease;
}
.dda-chat-rail-item:hover:not(:disabled) {
  background: var(--surface);
  border-color: var(--border-soft);
}
.dda-chat-rail-item.is-active {
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  border-color: color-mix(in srgb, var(--accent) 35%, transparent);
}
.dda-chat-rail-item:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.dda-chat-rail-item-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.dda-chat-rail-item-meta {
  font-size: 11px;
  color: var(--text-faint);
}
.dda-chat-rail-skel {
  height: 42px;
  border-radius: 8px;
  background: linear-gradient(
    90deg,
    var(--surface) 0%,
    var(--surface-hover) 50%,
    var(--surface) 100%
  );
  background-size: 200% 100%;
  animation: dda-skel 1.4s ease-in-out infinite;
}
@keyframes dda-skel {
  0% {
    background-position: 200% 0;
  }
  100% {
    background-position: -200% 0;
  }
}
@media (max-width: 900px) {
  .dda-chat-shell {
    grid-template-columns: 1fr;
  }
  .dda-chat-rail {
    display: none;
  }
}
.dda-chat-thinking {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.dda-chat-thinking .dot {
  background: var(--accent);
  box-shadow: none;
  animation: pulse 1s infinite;
}
.dda-chat-thinking .dot:nth-child(2) {
  animation-delay: 0.2s;
}
.dda-chat-thinking .dot:nth-child(3) {
  animation-delay: 0.4s;
}

.dda-env-tile {
  flex: 1 1 200px;
  cursor: pointer;
  padding: var(--pad-card);
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--surface-2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition:
    background 0.12s,
    border-color 0.12s;
}
.dda-env-tile[data-active="true"] {
  border-color: var(--accent-line);
  background: var(--accent-soft);
}
.dda-env-tile:hover {
  border-color: var(--accent-line);
}

/* ---------- Plan + billing rows (Phase 4) ---------- */
.dda-plan-card {
  position: relative;
}
.dda-plan-pop {
  position: absolute;
  top: 14px;
  right: 14px;
}
.dda-card-brand {
  width: 44px;
  height: 30px;
  border-radius: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-weight: 800;
  font-size: 11px;
  flex: none;
}

.dda-toggle-row {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border-soft);
  transition: background 0.12s;
}
.dda-toggle-row:last-child {
  border-bottom: none;
}
.dda-toggle-row:hover {
  background: var(--surface-2);
}
.dda-toggle-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  flex: none;
  background: var(--surface-2);
  color: var(--text-muted);
}
.dda-toggle-icon[data-active="true"] {
  background: var(--accent-soft);
  color: var(--accent);
}

.dda-security-row {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-soft);
}
.dda-security-row:last-child {
  border-bottom: none;
}
.dda-security-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: var(--surface-2);
  color: var(--text-muted);
  flex: none;
}

.dda-sub-banner {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  padding: 18px;
  border-radius: 14px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
}
.dda-sub-banner-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: none;
}

.dda-profile-card {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  padding: var(--pad-card);
}
.dda-profile-avatar-edit {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 28px;
  height: 28px;
  border-radius: 99px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--surface);
}

.dda-backup-codes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
}
.dda-backup-code {
  padding: 8px 10px;
  background: var(--surface-2);
  border-radius: 8px;
  border: 1px solid var(--border-soft);
  font-size: 13px;
  text-align: center;
  font-family: var(--font-mono);
}

/* ---------- Project tile + wizard (Phase 3) ---------- */
.dda-project-tile {
  text-decoration: none;
  transition:
    border-color 0.14s,
    box-shadow 0.14s,
    transform 0.08s;
  cursor: pointer;
}
.dda-project-tile:hover {
  border-color: var(--accent-line);
  box-shadow: var(--shadow);
}
.dda-project-tile:active {
  transform: translateY(1px);
}
.dda-project-create {
  border-style: dashed;
  min-height: 240px;
  color: var(--text-faint);
  background: var(--surface);
  cursor: pointer;
  text-decoration: none;
  transition:
    border-color 0.14s,
    background 0.14s;
}
.dda-project-create:hover {
  border-color: var(--accent-line);
  background: var(--surface-2);
}
.dda-project-create-icon {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  background: var(--surface-2);
}

.dda-row-list-row {
  transition: background 0.12s;
}
.dda-row-list-row:hover {
  background: var(--surface-2);
}

.dda-dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 900px) {
  .dda-dash-grid {
    grid-template-columns: 1fr;
  }
}

.dda-stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}

.dda-wizard-gh-card {
  padding: 22px 16px;
  border: 1px dashed var(--border);
  border-radius: 12px;
  background: var(--surface-2);
  text-align: center;
}
.dda-wizard-gh-connected {
  padding: 10px 14px;
  border-radius: 10px;
  background: var(--ok-soft);
  color: var(--ok);
  font-size: 13px;
}
.dda-wizard-repo-row {
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  width: 100%;
  text-align: left;
  font-family: inherit;
  color: inherit;
}
.dda-wizard-repo-row[data-on="true"] {
  border-color: var(--accent-line);
  background: var(--accent-soft);
}
.dda-wizard-check {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  flex: none;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--accent-fg);
}
.dda-wizard-check[data-on="true"] {
  border-color: var(--accent);
  background: var(--accent);
}

.dda-wizard-env-row {
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.dda-wizard-env-row[data-on="true"] {
  border-color: var(--accent-line);
  background: var(--accent-soft);
}
.dda-wizard-iam-note {
  padding: 12px;
  background: var(--info-soft);
  border-radius: 10px;
  color: var(--info);
}
.dda-wizard-summary {
  padding: 14px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  box-shadow: none;
}

/* ---------- Landing page (v1.0) ---------- */
.dda-landing {
  min-height: 100vh;
  background: var(--bg-grad);
  display: flex;
  flex-direction: column;
}

.dda-landing-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px clamp(20px, 4vw, 56px);
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
  background: oklch(0 0 0 / 0);
}
[data-theme="light"] .dda-landing-nav {
  background: oklch(1 0 0 / 0.5);
}

.dda-landing-hero {
  position: relative;
  padding: clamp(48px, 10vw, 120px) clamp(20px, 4vw, 56px) clamp(48px, 8vw, 80px);
  text-align: center;
  overflow: hidden;
}
.dda-landing-hero-glow {
  position: absolute;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: min(1100px, 100%);
  height: 700px;
  background: radial-gradient(
    closest-side,
    oklch(0.62 0.18 var(--accent-h) / 0.22),
    transparent 70%
  );
  pointer-events: none;
  z-index: 0;
}
.dda-landing-hero-inner {
  position: relative;
  z-index: 1;
  max-width: 840px;
  margin: 0 auto;
  align-items: center;
}
.dda-landing-hero h1 {
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 800;
  letter-spacing: -0.035em;
  line-height: 1.05;
  margin-top: 6px;
}
.dda-landing-grad {
  background: linear-gradient(
    120deg,
    oklch(0.72 0.18 var(--accent-h)),
    oklch(0.62 0.16 calc(var(--accent-h) + 40))
  );
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.dda-landing-sub {
  font-size: clamp(15px, 1.6vw, 18px);
  line-height: 1.55;
  max-width: 640px;
  margin: 0 auto;
}
.dda-landing-cta {
  justify-content: center;
  margin-top: 8px;
}
.dda-landing-trust {
  font-size: 12px;
  margin-top: 6px;
  justify-content: center;
}

.dda-landing-section {
  padding: clamp(48px, 8vw, 96px) clamp(20px, 4vw, 56px);
  max-width: 1180px;
  margin: 0 auto;
  width: 100%;
}

.dda-landing-eyebrow {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.dda-landing-features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.dda-landing-feature h3 {
  font-size: 16px;
  letter-spacing: -0.01em;
  margin: 0;
}
.dda-landing-feature p {
  font-size: 13.5px;
  line-height: 1.55;
  margin: 0;
}
.dda-landing-feature-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--accent-soft);
  color: var(--accent);
  flex: none;
}

.dda-landing-how h2 {
  font-size: clamp(28px, 4vw, 40px);
  letter-spacing: -0.02em;
}
.dda-landing-steps {
  list-style: none;
  padding: 0;
  margin: 32px auto 0;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  max-width: 880px;
}
@media (max-width: 720px) {
  .dda-landing-steps {
    grid-template-columns: 1fr;
  }
}
.dda-landing-step {
  display: flex;
  gap: 14px;
  padding: 20px 22px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  align-items: flex-start;
}
.dda-landing-step h4 {
  font-size: 14.5px;
  margin: 2px 0 2px;
}
.dda-landing-step p {
  font-size: 13px;
  line-height: 1.5;
  margin: 0;
}
.dda-landing-step-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 99px;
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 800;
  font-size: 13px;
  flex: none;
  border: 1px solid var(--accent-line);
}

.dda-landing-final-card {
  background: var(--surface);
  border: 1px solid var(--accent-line);
  border-radius: var(--radius-lg);
  padding: clamp(36px, 6vw, 64px) clamp(24px, 5vw, 56px);
  position: relative;
  overflow: hidden;
  background-image: radial-gradient(700px 220px at 50% 0%, var(--accent-soft), transparent 70%);
}
.dda-landing-final-card h2 {
  font-size: clamp(24px, 3.5vw, 36px);
  letter-spacing: -0.02em;
}

.dda-landing-foot {
  border-top: 1px solid var(--border-soft);
  margin-top: auto;
  padding: 24px clamp(20px, 4vw, 56px);
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.dda-landing-foot a:hover {
  color: var(--accent);
}

/* ---------- Chaos banner (Phase 10) ---------- */
.dda-chaos-banner {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  background: var(--warn-soft);
  border-bottom: 1px solid var(--warn);
  color: var(--warn);
  font-size: 12.5px;
  font-weight: 600;
}

/* ---------- Live alert banner ---------- */
.dda-alert-banner {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 9px 20px;
  background: var(--warn-soft);
  border-bottom: 1px solid var(--warn);
  color: var(--warn);
  font-size: 12.5px;
  font-weight: 600;
}
.dda-alert-banner.high {
  background: var(--danger-soft, color-mix(in srgb, var(--danger) 14%, transparent));
  border-bottom-color: var(--danger);
  color: var(--danger);
  animation: ddaAlertFlash 2.4s ease-in-out infinite;
}
@keyframes ddaAlertFlash {
  0%,
  100% {
    box-shadow: inset 0 0 0 0 transparent;
  }
  50% {
    box-shadow: inset 0 3px 0 0 var(--danger);
  }
}
.dda-alert-pulse {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: currentColor;
  flex: none;
  animation: ddaAlertPulse 1.3s ease-in-out infinite;
}
@keyframes ddaAlertPulse {
  0%,
  100% {
    opacity: 1;
    transform: scale(1);
    box-shadow: 0 0 0 0 currentColor;
  }
  70% {
    opacity: 0.7;
    transform: scale(1.15);
    box-shadow: 0 0 0 5px transparent;
  }
}
.dda-alert-text {
  min-width: 0;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dda-alert-where {
  font-weight: 400;
  opacity: 0.8;
}
.dda-alert-link {
  flex: none;
  color: inherit;
  text-decoration: underline;
  font-weight: 700;
}
.dda-alert-x {
  flex: none;
  background: none;
  border: none;
  color: inherit;
  cursor: pointer;
  opacity: 0.7;
  display: inline-flex;
  padding: 2px;
}
.dda-alert-x:hover {
  opacity: 1;
}

/* High-severity "alert mode" — pulsing red edge around the whole app surface. */
.dda-shell.dda-alert-mode {
  box-shadow: inset 0 0 0 2px var(--danger);
  animation: ddaScreenAlert 2.4s ease-in-out infinite;
}
@keyframes ddaScreenAlert {
  0%,
  100% {
    box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--danger) 55%, transparent);
  }
  50% {
    box-shadow: inset 0 0 0 3px var(--danger);
  }
}

/* ---------- App shell (Phase 2) ---------- */
.dda-shell {
  height: 100vh;
  overflow: hidden;
  align-items: stretch;
}
.dda-sidebar {
  width: 248px;
  flex: none;
  background: var(--surface);
  border-right: 1px solid var(--border);
  height: 100%;
  overflow-y: auto;
}
.dda-sidebar-desktop {
  height: 100%;
}
.dda-sidebar-head {
  padding: 16px 16px 10px;
}
.dda-sidebar-nav {
  padding: 6px 12px;
  flex: 1;
}
.dda-sidebar-sep {
  color: var(--text-faint);
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 14px 10px 6px;
}
.dda-sidebar-item {
  padding: 9px 10px;
  border-radius: 9px;
  gap: 11px;
  font-size: 13.5px;
  font-weight: 600;
  background: transparent;
  color: var(--text-muted);
  transition:
    background 0.12s,
    color 0.12s;
  text-decoration: none;
}
.dda-sidebar-item:hover {
  background: var(--surface-2);
  color: var(--text);
}
.dda-sidebar-item.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.dda-sidebar-foot {
  padding: 12px;
  border-top: 1px solid var(--border-soft);
}
.dda-sidebar-status {
  padding: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  box-shadow: none;
}

.dda-topbar {
  height: 60px;
  flex: none;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 60;
  gap: 12px;
}
.dda-main {
  overflow-y: auto;
  overflow-x: hidden;
}
.dda-page-wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px clamp(16px, 3vw, 32px) 64px;
}

.dda-search-box {
  height: 38px;
  padding: 0 12px;
  border-radius: 9px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  width: 300px;
  max-width: 42vw;
  color: var(--text-faint);
}

.dda-mob-menu,
.dda-mob-menu-floating {
  display: none;
}

.dda-mobile-drawer {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  z-index: 160;
  display: flex;
  animation: ddaSlideIn 0.18s ease;
}
@keyframes ddaSlideIn {
  from {
    transform: translateX(-100%);
  }
  to {
    transform: none;
  }
}

.dda-project-switcher {
  width: 100%;
  padding: 8px 10px;
  border-radius: 9px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  cursor: pointer;
  color: var(--text);
}
.dda-project-switcher:hover {
  background: var(--surface-3);
}

.dda-notif-row {
  padding: 9px 10px;
  border-radius: 8px;
}
.dda-notif-icon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--surface-2);
  color: var(--accent);
  flex: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.dda-user-pill {
  padding: 4px 8px 4px 4px;
  border-radius: 99px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  cursor: pointer;
  color: var(--text);
}
.dda-user-pill:hover {
  background: var(--surface-3);
}

.dda-tweaks-sheet {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: 360px;
  max-width: calc(100vw - 32px);
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  z-index: 210;
  animation: ddaSlideInRight 0.18s ease;
  overflow-y: auto;
}
@keyframes ddaSlideInRight {
  from {
    transform: translateX(100%);
  }
  to {
    transform: none;
  }
}

.dda-tweak-swatch {
  width: 28px;
  height: 28px;
  border-radius: 99px;
  border: 1px solid var(--border);
  cursor: pointer;
}
.dda-tweak-swatch[data-active="true"] {
  border: 2px solid var(--text);
  box-shadow: 0 0 0 2px var(--accent-soft);
}

@media (max-width: 900px) {
  .dda-sidebar-desktop {
    display: none;
  }
  .dda-mob-menu {
    display: inline-flex;
  }
  .dda-page-wrap {
    padding: 20px clamp(12px, 3vw, 20px) 48px;
  }
}
@media (max-width: 560px) {
  .dda-search-box {
    display: none;
  }
  .hide-sm {
    display: none;
  }
  .dda-topbar {
    padding: 0 12px;
  }
}

/* ---------- Auth shell (Phase 1) ---------- */
.auth-frame {
  display: flex;
  flex-direction: row;
  min-height: 100vh;
  overflow: auto;
}
.auth-brand {
  width: 44%;
  max-width: 560px;
  flex: none;
  padding: 48px 56px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.auth-brand-glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(700px 400px at 20% 10%, var(--accent-soft), transparent 60%);
  pointer-events: none;
}
.auth-brand-inner {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.auth-brand-pitch {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 24px;
  justify-content: center;
  padding-right: 20px;
}
.auth-brand-pitch h1 {
  font-size: 34px;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.03em;
}
.auth-brand-pitch p {
  font-size: 15.5px;
  line-height: 1.55;
}
.auth-feat {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border-radius: 9px;
  background: var(--accent-soft);
  color: var(--accent);
  flex: none;
}
.auth-brand-foot {
  font-size: 12px;
}
.auth-form-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  overflow: auto;
}
.auth-form-col {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.auth-logo-mobile {
  display: none;
}
.auth-divider {
  display: flex;
  align-items: center;
  gap: 12px;
}
.auth-divider .divider {
  flex: 1;
  height: 1px;
  background: var(--border-soft);
}
.auth-divider span {
  font-size: 12px;
  color: var(--text-faint);
}
.auth-link {
  color: var(--accent);
  font-weight: 700;
  cursor: pointer;
}
.auth-link:hover {
  text-decoration: underline;
}
.auth-pwd-checklist {
  padding: 12px 14px;
  background: var(--surface-2);
  border-radius: 10px;
  border: 1px solid var(--border-soft);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.auth-pwd-req {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
}
.auth-pwd-req.met {
  color: var(--ok);
}
.auth-pwd-req.unmet {
  color: var(--text-faint);
}
.auth-otp-row {
  display: flex;
  gap: 8px;
  justify-content: space-between;
}
.auth-otp-input {
  width: 50px;
  height: 58px;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  padding: 0;
  font-family: var(--font-mono);
}
.auth-key-row {
  display: flex;
  align-items: center;
  gap: 16px;
}
.auth-qr {
  width: 130px;
  height: 130px;
  flex: none;
  border-radius: 12px;
}
.auth-key-code {
  font-family: var(--font-mono);
  font-size: 12.5px;
  padding: 8px 10px;
  background: var(--surface-2);
  border-radius: 8px;
  border: 1px solid var(--border);
  letter-spacing: 0.08em;
}

@media (max-width: 900px) {
  .auth-frame {
    flex-direction: column;
  }
  .auth-brand {
    display: none;
  }
  .auth-logo-mobile {
    display: block;
  }
  .auth-form-wrap {
    padding: 32px 20px;
    justify-content: flex-start;
  }
}

@media (max-width: 480px) {
  .auth-key-row {
    flex-direction: column;
    align-items: flex-start;
  }
  .auth-otp-input {
    width: 44px;
    height: 52px;
    font-size: 19px;
  }
}

/* ---------- Empty state ---------- */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 20px;
  gap: 12px;
  color: var(--text-muted);
}
.empty-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
}
.empty-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.empty-sub {
  font-size: 12.5px;
  max-width: 320px;
}

/* Streaming chat cursor — sits next to the partial agent bubble while
   Claude is still writing. Pulses to signal "still going". */
.dda-chat-streaming-wrap {
  position: relative;
}
.dda-chat-streaming-cursor {
  display: inline-block;
  color: var(--accent);
  font-weight: 700;
  margin-left: 4px;
  animation: chatCursor 1s steps(2) infinite;
}
@keyframes chatCursor {
  0%,
  50% {
    opacity: 1;
  }
  50.01%,
  100% {
    opacity: 0;
  }
}

/* Markdown body — tighten Claude's response inside the agent bubble.
   The bubble already has padding; reset the leading/trailing margins
   on the first/last block-level child. */
.dda-md > :first-child {
  margin-top: 0;
}
.dda-md > :last-child {
  margin-bottom: 0;
}


/* Shell composition — matches src/components/shell/AppShell.tsx */
.dda-shell { display: flex; height: 100vh; overflow: hidden; }
.dda-page-wrap { max-width: 1180px !important; margin: 0 auto; padding: 24px clamp(16px, 3vw, 32px) 64px !important; }
h1 { font-size: 22px !important; }
h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); }
@media (max-width: 900px) {
  .dda-shell { flex-direction: column; }
  .dda-sidebar { width: 100% !important; height: auto; }
}

const Btn = ({ variant = "outline", size, icon, children, onClick, disabled, block }) => html`
  <button class=${"btn " + variant + (size ? " " + size : "") + (block ? " block" : "")} onClick=${onClick} disabled=${disabled}>
    ${icon && html`<span>${icon}</span>`}${children}
  </button>`;

const Chip = ({ active, children, onClick, icon }) => html`
  <button class=${"chip" + (active ? " active" : "")} onClick=${onClick}>
    ${icon && html`<span>${icon}</span>`}${children}
  </button>`;

const Badge = ({ tone, children }) => html`
  <span class=${"badge" + (tone ? " " + tone : "")}>${["ok","warn","danger","info"].includes(tone) && html`<span class="dot" aria-hidden></span>`}${children}</span>`;

const Dot = ({ tone = "ok" }) => html`<span class="dot" style=${{background: "var(--" + tone + ")"}}></span>`;

const Card = ({ title, sub, actions, maxWidth, pad = true, children }) => html`
  <section class="card" style=${maxWidth ? {maxWidth: maxWidth + "px", width: "100%"} : null}>
    ${title != null && html`
      <div class="card-h">
        <div class="col" style=${{gap: 2}}>
          <span class="card-title">${title}</span>
          ${sub && html`<span class="faint" style=${{fontSize: 12}}>${sub}</span>`}
        </div>
        ${actions && html`<div class="row gap-2" style=${{marginLeft: "auto"}}>${actions}</div>`}
      </div>`}
    <div class=${pad ? "card-pad" : ""}>${children}</div>
  </section>`;

const Field = ({ label, hint, children, required }) => html`
  <label class="col gap-1">
    <span class="field-label">${label}${required && html`<span style=${{color: "var(--danger)", marginLeft: 4}}>*</span>`}</span>
    ${children}
    ${hint && html`<span class="faint" style=${{fontSize: 11.5, marginTop: 4}}>${hint}</span>`}
  </label>`;

const Input = ({ value, onInput, placeholder, readonly, type = "text" }) => html`
  <input class="input" type=${type} value=${value} placeholder=${placeholder} onInput=${onInput} readonly=${readonly} />`;

const Select = ({ value, onChange, options }) => {
  const [open, setOpen] = useState(false);
  return html`
    <div style=${{position: "relative"}}>
      <button class="select" style=${{cursor: "pointer", width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between"}} onClick=${() => setOpen(!open)}>
        <span>${value ?? "Choose…"}</span>
        <span class="faint">▾</span>
      </button>
      ${open && html`
        <div style=${{position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, background: "var(--surface-2)", border: "1px solid var(--border)", borderRadius: 8, boxShadow: "var(--shadow)", zIndex: 100, overflow: "hidden"}}>
          ${options.map((o) => html`
            <button style=${{display: "block", width: "100%", padding: "10px 14px", background: value === o ? "var(--surface-3)" : "transparent", border: "none", textAlign: "left", cursor: "pointer", color: "var(--text)", fontFamily: "inherit", fontSize: 13}} onClick=${() => { onChange(o); setOpen(false); }}>${o}</button>
          `)}
        </div>`}
    </div>`;
};

const Stat = ({ label, value, sub, icon }) => html`
  <div class="card card-pad" style=${{minWidth: 0}}>
    <div class="row between" style=${{alignItems: "flex-start"}}>

// Cloud stats — Grafana-style monitoring dashboard

// Generate believable-looking time-series data (60 points, deterministic).
const genSeries = (seed, base, amp, spike) => {
  const out = [];
  let v = base;
  for (let i = 0; i < 60; i++) {
    v = base + Math.sin(i * 0.3 + seed) * amp + Math.cos(i * 0.15 + seed * 2) * amp * 0.4;
    if (spike && i > 40 && i < 50) v += spike * (1 - Math.abs(i - 45) / 5);
    out.push(Math.max(0, v));
  }
  return out;
};

// Draw an SVG line chart. Points are normalized into the viewBox.
const LineChart = ({ series, max, color, w = 500, h = 140, showArea = true }) => {
  const step = w / (series.length - 1);
  const points = series.map((v, i) => [i * step, h - (v / max) * h]);
  const path = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = path + " L " + w + " " + h + " L 0 " + h + " Z";
  return html`
    <svg viewBox=${"0 0 " + w + " " + h} preserveAspectRatio="none" style=${{width: "100%", height: h, display: "block"}}>
      ${[0.25, 0.5, 0.75].map((y) => html`<line x1="0" x2=${w} y1=${h * y} y2=${h * y} stroke="var(--border-soft)" stroke-width="0.5" stroke-dasharray="4 4" />`)}
      ${showArea && html`<path d=${area} fill=${color} opacity="0.15" />`}
      <path d=${path} fill="none" stroke=${color} stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />
    </svg>`;
};

const StatsPage = () => {
  const proj = useProject();
  const cpu = genSeries(1, 55, 12, 20);
  const mem = genSeries(2, 62, 8, 0);
  const req = genSeries(3, 340, 80, 100);
  const err = genSeries(4, 0.3, 0.2, 1.5);
  const pods = { running: 7, pending: 1, failed: 0, total: 8 };
  const donutRadius = 60, donutInner = 40;
  const donutSegs = [
    { color: "var(--ok)", value: pods.running, label: "Running" },
    { color: "var(--warn)", value: pods.pending, label: "Pending" },
    { color: "var(--danger)", value: pods.failed, label: "Failed" },
  ];
  let cum = 0;
  const donutPaths = donutSegs.map((s) => {
    const start = (cum / pods.total) * Math.PI * 2 - Math.PI / 2;
    cum += s.value;
    const end = (cum / pods.total) * Math.PI * 2 - Math.PI / 2;
    const x1 = 90 + donutRadius * Math.cos(start), y1 = 90 + donutRadius * Math.sin(start);
    const x2 = 90 + donutRadius * Math.cos(end), y2 = 90 + donutRadius * Math.sin(end);
    const x3 = 90 + donutInner * Math.cos(end), y3 = 90 + donutInner * Math.sin(end);
    const x4 = 90 + donutInner * Math.cos(start), y4 = 90 + donutInner * Math.sin(start);
    const large = end - start > Math.PI ? 1 : 0;
    return { ...s, path: "M " + x1 + " " + y1 + " A " + donutRadius + " " + donutRadius + " 0 " + large + " 1 " + x2 + " " + y2 + " L " + x3 + " " + y3 + " A " + donutInner + " " + donutInner + " 0 " + large + " 0 " + x4 + " " + y4 + " Z" };
  });
  return html`
    <${PageHead} title="Cloud stats" sub=${"Live cluster metrics for " + proj.clusterName + " (" + proj.cloudLabel + ") via in-cluster Prometheus + Grafana."} actions=${html`<${Btn} icon="↗">Open in Grafana<//><${Btn} variant="primary" icon="↻">Refresh<//>`} />

    <div style=${{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14}}>
      <${Card} title="Pod status" sub=${pods.total + " pods across " + proj.clusterNodes + " nodes"}>
        <div class="row gap-4" style=${{alignItems: "center"}}>

const PromotionsPage = () => {

    setPendingPromo(null);
  };

  const envs = ["alpha", "beta", "release"];

                ${app.images[envs[i-1]] && app.images[envs[i-1]] !== app.images[env] ? html`
                  <button class="btn primary sm" style=${{whiteSpace: "nowrap"}} onClick=${() => setPendingPromo({ app, from: envs[i-1], to: env })}>

              </div>`}
            <div style=${{padding: 14, background: "var(--surface-2)", border: "1px solid " + (app.images[env] ? "var(--border-soft)" : "var(--border)"), borderRadius: 10, minWidth: 0}}>

                <${Badge} tone=${envTone[env]}>${env}<//>
                <span class="faint" style=${{fontSize: 11}}>${envSub[env]}</span>
              </div>
              ${app.images[env] ? html`
                <div class="mono" style=${{fontSize: 12.5, fontWeight: 700, wordBreak: "break-all"}}>${app.images[env]}</div>
                <div class="row gap-2" style=${{marginTop: 8, alignItems: "center"}}>

        h.by,
        html`<${Badge} tone=${h.status === "succeeded" ? "ok" : "danger"}>${h.status}<//>`,

  `;

const LoginPage = ({ onLogin, onGoSignup }) => {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [remember, setRemember] = useState(true);
  const [emailError, setEmailError] = useState(null);
  const [pwdError, setPwdError] = useState(null);
  const [serverError, setServerError] = useState(null);
  const [submitting, setSubmitting] = useState(false);

  const submit = (e) => {
    e && e.preventDefault();
    let bad = false;
    if (!email) { setEmailError("Email is required"); bad = true; }
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setEmailError("Enter a valid email"); bad = true; }
    else setEmailError(null);
    if (!password) { setPwdError("Password is required"); bad = true; }
    else if (password.length < 8) { setPwdError("At least 8 characters"); bad = true; }
    else setPwdError(null);
    if (bad) return;
    setServerError(null);
    setSubmitting(true);
    // Demo: any valid-shape email + any 8+ char password succeeds.
    setTimeout(() => { setSubmitting(false); onLogin({ email }); }, 400);
  };

  const oauth = (provider) => {
    setSubmitting(true);
    setTimeout(() => { setSubmitting(false); onLogin({ email: "manoi.vv@example.com", via: provider }); }, 500);
  };

  return html`
    <${AuthFrame} foot=${html`
      <p class="muted" style=${{textAlign: "center", fontSize: 13}}>
        New here? <a class="auth-link" onClick=${onGoSignup} style=${{cursor: "pointer"}}>Create an account</a>
      </p>
    `}>
      <${AuthHead} title="Welcome back" sub="Log in to your DeepAgent workspace." />
      <div class="col gap-3" style=${{marginTop: 20}}>
        <a class="btn outline" style=${{display: "flex", justifyContent: "center", gap: 8, cursor: "pointer"}} onClick=${() => oauth("github")}>
          <${Icon} name="github" size=${16} />
          Continue with GitHub
        </a>
        <a class="btn outline" style=${{display: "flex", justifyContent: "center", gap: 8, cursor: "pointer"}} onClick=${() => oauth("google")}>
          <span style=${{width: 16, height: 16, borderRadius: "50%", background: "linear-gradient(135deg, #4285F4 0%, #34A853 50%, #FBBC05 75%, #EA4335 100%)", display: "inline-block"}}></span>
          Continue with Google
        </a>
      </div>
      <div class="auth-divider">
        <div class="divider"></div>
        <span>or</span>
        <div class="divider"></div>
      </div>
      <form class="col gap-4" onSubmit=${submit} noValidate>
        <label class="col gap-1">
          <span class="field-label">Work email</span>
          <input class="input" type="email" placeholder="you@company.com" value=${email} onInput=${(e) => setEmail(e.target.value)} />
          ${emailError && html`<span style=${{fontSize: 11.5, marginTop: 4, color: "var(--danger)"}}>${emailError}</span>`}
        </label>
        <label class="col gap-1">
          <span class="field-label">Password</span>
          <input class="input" type="password" placeholder="••••••••" value=${password} onInput=${(e) => setPassword(e.target.value)} />
          ${pwdError && html`<span style=${{fontSize: 11.5, marginTop: 4, color: "var(--danger)"}}>${pwdError}</span>`}
        </label>
        <div class="row between">
          <label class="row gap-2" style=${{cursor: "pointer", alignItems: "center"}} onClick=${() => setRemember(!remember)}>
            <span style=${{width: 32, height: 18, borderRadius: 999, background: remember ? "var(--accent)" : "var(--surface-3)", padding: 2, transition: "background .15s"}}>
              <span style=${{width: 14, height: 14, borderRadius: "50%", background: "white", display: "block", transform: remember ? "translateX(14px)" : "translateX(0)", transition: "transform .15s"}}></span>
            </span>
            <span style=${{fontSize: 13, fontWeight: 600}}>Remember me</span>
          </label>
          <a class="auth-link" style=${{fontSize: 13, cursor: "pointer"}}>Forgot password?</a>
        </div>
        ${serverError && html`<p style=${{fontSize: 12.5, color: "var(--danger)", margin: 0}}>${serverError}</p>`}
        <button type="submit" class="btn primary lg block" disabled=${submitting}>
          ${submitting ? "Signing in…" : "Log in"} <${Icon} name="chevR" size=${16} />
        </button>
        <p class="faint" style=${{fontSize: 11.5, textAlign: "center", margin: 0}}>
          Demo: any email + any 8-char password works.
        </p>
      </form>
    <//>`;
};

const SignupPage = ({ onLogin, onGoLogin }) => {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const passwordReqs = [
    { met: password.length >= 8, label: "At least 8 characters" },
    { met: /[A-Z]/.test(password), label: "One uppercase letter" },
    { met: /[0-9]/.test(password), label: "One digit" },
  ];
  const canSubmit = name && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) && passwordReqs.every((r) => r.met);
  const submit = (e) => {
    e && e.preventDefault();
    if (!canSubmit) return;
    setSubmitting(true);
    setTimeout(() => { setSubmitting(false); onLogin({ email, name }); }, 400);
  };
  return html`
    <${AuthFrame} foot=${html`
      <p class="muted" style=${{textAlign: "center", fontSize: 13}}>
        Already have an account? <a class="auth-link" onClick=${onGoLogin} style=${{cursor: "pointer"}}>Log in</a>
      </p>
    `}>
      <${AuthHead} title="Create your workspace" sub="Sign up to start using DeepAgent." />
      <form class="col gap-4" onSubmit=${submit} style=${{marginTop: 20}}>
        <label class="col gap-1">
          <span class="field-label">Full name</span>
          <input class="input" type="text" placeholder="Jane Doe" value=${name} onInput=${(e) => setName(e.target.value)} />
        </label>
        <label class="col gap-1">
          <span class="field-label">Work email</span>
          <input class="input" type="email" placeholder="you@company.com" value=${email} onInput=${(e) => setEmail(e.target.value)} />
        </label>
        <label class="col gap-1">
          <span class="field-label">Password</span>
          <input class="input" type="password" placeholder="Create a password" value=${password} onInput=${(e) => setPassword(e.target.value)} />
          <ul class="auth-pwd-checklist" style=${{listStyle: "none", padding: 0, margin: "8px 0 0"}}>
            ${passwordReqs.map((r) => html`
              <li class=${"auth-pwd-req" + (r.met ? " met" : "")} style=${{display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: r.met ? "var(--ok)" : "var(--text-muted)", padding: "2px 0"}}>
                <${Icon} name=${r.met ? "check" : "x"} size=${12} />
                <span>${r.label}</span>
              </li>`)}
          </ul>
        </label>
        <button type="submit" class="btn primary lg block" disabled=${!canSubmit || submitting}>
          ${submitting ? "Creating…" : "Create workspace"} <${Icon} name="chevR" size=${16} />
        </button>
        <p class="faint" style=${{fontSize: 11.5, textAlign: "center", margin: 0}}>
          By continuing you agree to the Terms and Privacy Policy.
        </p>
      </form>
    <//>`;
};

const App = () => {
  // Auth: on first mount, user is at the login screen. localStorage keeps
  // them signed in across refreshes so you don't have to re-log-in every
  // time you regenerate the wireframe. Clicking "Log out" in the user
  // dropdown clears the flag and drops you back to the login page.
  const [session, setSession] = useState(() => {
    try {
      const raw = localStorage.getItem("dda-wf-session");
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  });
  const [authScreen, setAuthScreen] = useState("login"); // "login" | "signup"
  const login = (user) => {
    setSession(user);
    try { localStorage.setItem("dda-wf-session", JSON.stringify(user)); } catch (e) {}
  };
  const logout = () => {
    setSession(null);
    try { localStorage.removeItem("dda-wf-session"); } catch (e) {}
    location.hash = "";
  };

  const [active, setActive] = useState(() => (location.hash.slice(1) in PAGES ? location.hash.slice(1) : "dashboard"));
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem("dda-wf-theme") || "dark"; } catch (e) { return "dark"; }
  });
  const [projectSlug, setProjectSlug] = useState(() => {
    try {
      const s = localStorage.getItem("dda-wf-project");
      return s && s in PROJECTS ? s : "agent-aws";
    } catch (e) { return "agent-aws"; }
  });
  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); try { localStorage.setItem("dda-wf-theme", theme); } catch (e) {} }, [theme]);
  useEffect(() => { try { localStorage.setItem("dda-wf-project", projectSlug); } catch (e) {} }, [projectSlug]);
  useEffect(() => {
    const on = () => { const id = location.hash.slice(1); if (id in PAGES) setActive(id); };
    window.addEventListener("hashchange", on);
    return () => window.removeEventListener("hashchange", on);
  }, []);

  // Not signed in → show the auth pages instead of the app shell.
  if (!session) {
    return authScreen === "login"
      ? html`<${LoginPage} onLogin=${login} onGoSignup=${() => setAuthScreen("signup")} />`
      : html`<${SignupPage} onLogin=${login} onGoLogin=${() => setAuthScreen("login")} />`;
  }

  const select = (id) => { setActive(id); location.hash = id; };
  const Page = PAGES[active].component;
  const isChat = active === "chat";
  const project = PROJECTS[projectSlug];
  return html`
    <${ProjectContext.Provider} value=${project}>
      <div class="dda-shell" style=${{display: "flex", height: "100vh", overflow: "hidden"}}>
        <${Sidebar} active=${active} onSelect=${select} activeProject=${projectSlug} onSwitchProject=${setProjectSlug} />
        <div class="col grow" style=${{minWidth: 0, minHeight: 0}}>
          <${Topbar} theme=${theme} onToggleTheme=${() => setTheme(theme === "dark" ? "light" : "dark")} project=${project} session=${session} onLogout=${logout} />
          <main class="dda-main grow">
            <div class="dda-page-wrap col gap-5" style=${isChat ? {maxWidth: "none", padding: 0, height: "100%"} : null}>
              <${Page} />
            </div>
          </main>
        </div>
      </div>
    <//>`;
};

render(h(App, null), document.getElementById("root"));

  </script>
