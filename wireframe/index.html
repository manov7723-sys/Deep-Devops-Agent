<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeepAgent — UI (single-file SPA)</title>
  <style>
/* ============================================================
 * tokens.css — DeepAgent design tokens (ported verbatim from wireframe)
 * Dark default, light supported, accent + density tweakable.
 * Do not edit values without updating the wireframe parity log.
 * ============================================================ */

:root {
  /* Accent (tweakable) — violet by default */
  --accent-h: 285;
  --accent-c: 0.17;
  --accent: oklch(0.62 var(--accent-c) var(--accent-h));
  --accent-strong: oklch(0.56 var(--accent-c) var(--accent-h));
  --accent-soft: oklch(0.62 var(--accent-c) var(--accent-h) / 0.14);
  --accent-line: oklch(0.62 var(--accent-c) var(--accent-h) / 0.34);
  --accent-fg: oklch(0.99 0 0);

  /* Status */
  --ok: oklch(0.74 0.15 158);
  --ok-soft: oklch(0.74 0.15 158 / 0.14);
  --warn: oklch(0.8 0.14 78);
  --warn-soft: oklch(0.8 0.14 78 / 0.15);
  --danger: oklch(0.66 0.2 22);
  --danger-soft: oklch(0.66 0.2 22 / 0.15);
  --info: oklch(0.72 0.13 235);
  --info-soft: oklch(0.72 0.13 235 / 0.15);

  /* Density (tweakable): comfortable default */
  --density: 1;
  --u: calc(4px * var(--density));
  --row-h: calc(40px * var(--density));
  --pad-card: calc(20px * var(--density));

  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 18px;
  --radius-pill: 999px;

  --font-ui: "Plus Jakarta Sans", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
  --shadow: 0 8px 24px -8px oklch(0 0 0 / 0.45);
  --shadow-lg: 0 24px 60px -20px oklch(0 0 0 / 0.6);
  --ring: 0 0 0 3px var(--accent-soft);
}

/* ---------- DARK (default) ---------- */
:root,
[data-theme="dark"] {
  --bg: oklch(0.17 0.012 274);
  --bg-grad:
    radial-gradient(1200px 700px at 80% -10%, oklch(0.62 0.1 285 / 0.1), transparent 60%), var(--bg);
  --surface: oklch(0.205 0.013 274);
  --surface-2: oklch(0.245 0.014 274);
  --surface-3: oklch(0.285 0.015 274);
  --border: oklch(0.32 0.013 274);
  --border-soft: oklch(0.27 0.012 274);
  --text: oklch(0.96 0.005 274);
  --text-muted: oklch(0.72 0.012 274);
  --text-faint: oklch(0.56 0.012 274);
  --overlay: oklch(0.1 0.01 274 / 0.62);
}

/* ---------- LIGHT ---------- */
[data-theme="light"] {
  --bg: oklch(0.975 0.004 274);
  --bg-grad:
    radial-gradient(1200px 700px at 80% -10%, oklch(0.62 0.12 285 / 0.08), transparent 60%),
    var(--bg);
  --surface: oklch(1 0 0);
  --surface-2: oklch(0.975 0.005 274);
  --surface-3: oklch(0.945 0.006 274);
  --border: oklch(0.9 0.006 274);
  --border-soft: oklch(0.93 0.005 274);
  --text: oklch(0.24 0.015 274);
  --text-muted: oklch(0.48 0.014 274);
  --text-faint: oklch(0.62 0.012 274);
  --overlay: oklch(0.3 0.02 274 / 0.35);
  --shadow-sm: 0 1px 2px oklch(0.3 0.02 274 / 0.08);
  --shadow: 0 10px 30px -12px oklch(0.3 0.02 274 / 0.18);
  --shadow-lg: 0 30px 70px -24px oklch(0.3 0.02 274 / 0.22);
  --accent-fg: oklch(0.99 0 0);
}

/* ============================================================
 * primitives.css — DeepAgent design system primitives.
 * .card .btn .badge .dot .input .toggle .tabs .prog .skel and friends.
 * Class names match the wireframe so React primitives stay minimal.
 * ============================================================ */

* {
  box-sizing: border-box;
}
html,
body {
  margin: 0;
  padding: 0;
  height: 100%;
}
body {
  font-family: var(--font-ui);
  background: var(--bg-grad);
  background-attachment: fixed;
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection {
  background: var(--accent-soft);
}

/* scrollbars */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
*::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
*::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 99px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
*::-webkit-scrollbar-thumb:hover {
  background: var(--surface-3);
}

h1,
h2,
h3,
h4,
h5 {
  margin: 0;
  font-weight: 700;
  letter-spacing: -0.015em;
  line-height: 1.2;
}
p {
  margin: 0;
}
a {
  color: inherit;
  text-decoration: none;
}
button {
  font-family: inherit;
}
.mono {
  font-family: var(--font-mono);
  font-feature-settings: "ss01";
}

/* ---------- utility ---------- */
.muted {
  color: var(--text-muted);
}
.faint {
  color: var(--text-faint);
}
.row {
  display: flex;
  align-items: center;
}
.col {
  display: flex;
  flex-direction: column;
}
.gap-1 {
  gap: 4px;
}
.gap-2 {
  gap: 8px;
}
.gap-3 {
  gap: 12px;
}
.gap-4 {
  gap: 16px;
}
.gap-5 {
  gap: 20px;
}
.gap-6 {
  gap: 24px;
}
.grow {
  flex: 1;
}
.wrap {
  flex-wrap: wrap;
}
.center {
  align-items: center;
  justify-content: center;
}
.between {
  justify-content: space-between;
}
.tnum {
  font-variant-numeric: tabular-nums;
}
.nowrap {
  white-space: nowrap;
}
.tx-pretty {
  text-wrap: pretty;
}
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* ---------- card / block ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.card-pad {
  padding: var(--pad-card);
}
.card-h {
  padding: 16px var(--pad-card);
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-title {
  font-size: 13.5px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.card-toolbar {
  padding: 12px var(--pad-card);
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

/* ---------- button ---------- */
.btn {
  --h: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: var(--h);
  padding: 0 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition:
    background 0.14s,
    border-color 0.14s,
    transform 0.06s,
    box-shadow 0.14s,
    color 0.14s;
  user-select: none;
}
.btn:hover {
  background: var(--surface-3);
  border-color: var(--surface-3);
}
.btn:active {
  transform: translateY(1px);
}
.btn svg {
  width: 16px;
  height: 16px;
}
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-fg);
}
.btn.primary:hover {
  background: var(--accent-strong);
  border-color: var(--accent-strong);
}
.btn.ghost {
  background: transparent;
  border-color: transparent;
}
.btn.ghost:hover {
  background: var(--surface-2);
}
.btn.outline {
  background: transparent;
}
.btn.outline:hover {
  background: var(--surface-2);
}
.btn.danger {
  background: var(--danger-soft);
  border-color: transparent;
  color: var(--danger);
}
.btn.danger:hover {
  background: var(--danger);
  color: white;
}
.btn.sm {
  --h: 30px;
  padding: 0 10px;
  font-size: 12px;
}
.btn.lg {
  --h: 44px;
  padding: 0 20px;
  font-size: 14px;
}
.btn.icon {
  padding: 0;
  width: var(--h);
}
.btn.block {
  width: 100%;
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.btn:focus-visible {
  outline: none;
  box-shadow: var(--ring);
}

/* ---------- input ---------- */
.input,
.select,
.textarea {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
  transition:
    border-color 0.14s,
    box-shadow 0.14s,
    background 0.14s;
}
.textarea {
  height: auto;
  padding: 10px 12px;
  resize: vertical;
  line-height: 1.5;
}
.input::placeholder,
.textarea::placeholder {
  color: var(--text-faint);
}
.input:focus,
.select:focus,
.textarea:focus {
  outline: none;
  border-color: var(--accent-line);
  box-shadow: var(--ring);
}
.field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  display: block;
}

/* ---------- badge / pill ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 22px;
  padding: 0 9px;
  border-radius: var(--radius-pill);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  white-space: nowrap;
}
.badge.ok {
  background: var(--ok-soft);
  color: var(--ok);
  border-color: transparent;
}
.badge.warn {
  background: var(--warn-soft);
  color: var(--warn);
  border-color: transparent;
}
.badge.danger {
  background: var(--danger-soft);
  color: var(--danger);
  border-color: transparent;
}
.badge.info {
  background: var(--info-soft);
  color: var(--info);
  border-color: transparent;
}
.badge.accent {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: transparent;
}
.badge.solid-ok {
  background: var(--ok);
  color: #04210f;
  border-color: transparent;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 99px;
  background: var(--text-faint);
  flex: none;
}
.dot.ok {
  background: var(--ok);
  box-shadow: 0 0 0 3px var(--ok-soft);
}
.dot.warn {
  background: var(--warn);
  box-shadow: 0 0 0 3px var(--warn-soft);
}
.dot.danger {
  background: var(--danger);
  box-shadow: 0 0 0 3px var(--danger-soft);
}
.dot.info {
  background: var(--info);
  box-shadow: 0 0 0 3px var(--info-soft);
}
.dot.pulse {
  animation: pulse 1.8s infinite;
}
@keyframes pulse {
  0%,
  100% {
    opacity: 1;
  }
  50% {
    opacity: 0.35;
  }
}

/* ---------- table ---------- */
.tbl {
  width: 100%;
  border-collapse: collapse;
}
.tbl th {
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-faint);
  font-weight: 700;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-soft);
}
.tbl td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-soft);
  font-size: 13px;
}
.tbl tbody tr {
  transition: background 0.12s;
}
.tbl tbody tr:hover {
  background: var(--surface-2);
}
.tbl tbody tr:last-child td {
  border-bottom: none;
}

/* ---------- tabs ---------- */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
  transition:
    color 0.12s,
    border-color 0.12s;
  background: transparent;
  border-left: none;
  border-right: none;
  border-top: none;
}
.tab:hover {
  color: var(--text);
}
.tab.active,
.tab[data-state="active"] {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* ---------- toggle (visual) ---------- */
.toggle {
  width: 38px;
  height: 22px;
  border-radius: 99px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  flex: none;
  transition: background 0.16s;
}
.toggle::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  border-radius: 99px;
  background: var(--text-muted);
  transition:
    transform 0.16s,
    background 0.16s;
}
.toggle.on,
.toggle[data-state="checked"] {
  background: var(--accent);
  border-color: var(--accent);
}
.toggle.on::after,
.toggle[data-state="checked"]::after {
  transform: translateX(16px);
  background: white;
}

/* ---------- progress ---------- */
.prog {
  height: 6px;
  border-radius: 99px;
  background: var(--surface-3);
  overflow: hidden;
}
.prog > i {
  display: block;
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.4s;
}
.prog.ok > i {
  background: var(--ok);
}
.prog.warn > i {
  background: var(--warn);
}
.prog.danger > i {
  background: var(--danger);
}

/* ---------- misc ---------- */
.kbd {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 5px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.divider {
  height: 1px;
  background: var(--border-soft);
}
.vdivider {
  width: 1px;
  background: var(--border-soft);
  align-self: stretch;
}
.avatar {
  border-radius: 99px;
  object-fit: cover;
  background: var(--surface-3);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: var(--accent-fg);
  flex: none;
  overflow: hidden;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 28px;
  padding: 0 10px;
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
}
.chip:hover {
  color: var(--text);
  border-color: var(--surface-3);
}
.chip.active {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: var(--accent-line);
}

.skel {
  background: linear-gradient(90deg, var(--surface-2), var(--surface-3), var(--surface-2));
  background-size: 200% 100%;
  animation: skel 1.4s infinite;
  border-radius: 6px;
}
@keyframes skel {
  0% {
    background-position: 200% 0;
  }
  100% {
    background-position: -200% 0;
  }
}

.fade-in {
  animation: fadeIn 0.32s ease;
}
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}
.pop-in {
  animation: popIn 0.18s ease;
}
@keyframes popIn {
  from {
    opacity: 0;
    transform: scale(0.97) translateY(4px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

/* --- Modal entrance + exit (Radix Dialog content) ---------------- */
.modal-content[data-state="open"] {
  animation: modalIn 0.26s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal-content[data-state="closed"] {
  animation: modalOut 0.16s cubic-bezier(0.4, 0, 1, 1);
}
@keyframes modalIn {
  from {
    opacity: 0;
    transform: translate(-50%, calc(-50% + 12px)) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}
@keyframes modalOut {
  from {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  to {
    opacity: 0;
    transform: translate(-50%, calc(-50% + 8px)) scale(0.98);
  }
}

.modal-backdrop[data-state="open"] {
  animation: backdropIn 0.22s ease-out;
}
.modal-backdrop[data-state="closed"] {
  animation: backdropOut 0.16s ease-in;
}
@keyframes backdropIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}
@keyframes backdropOut {
  from {
    opacity: 1;
  }
  to {
    opacity: 0;
  }
}

@media (prefers-reduced-motion: reduce) {
  .modal-content[data-state="open"],
  .modal-content[data-state="closed"],
  .modal-backdrop[data-state="open"],
  .modal-backdrop[data-state="closed"] {
    animation: none;
  }
}
.spin {
  animation: spin 1.1s linear infinite;
}
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* placeholder image */
.ph {
  background-image: repeating-linear-gradient(
    45deg,
    var(--surface-2),
    var(--surface-2) 10px,
    var(--surface-3) 10px,
    var(--surface-3) 20px
  );
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
  font-family: var(--font-mono);
  font-size: 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

/* ---------- Radix overlay (modal backdrop) ---------- */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(3px);
}

.dda-proj-dash-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 14px;
}
@media (max-width: 1000px) {
  .dda-proj-dash-grid {
    grid-template-columns: 1fr;
  }
}

.dda-approvals-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 1.3fr;
  gap: 14px;
  align-items: start;
}
@media (max-width: 1000px) {
  .dda-approvals-grid {
    grid-template-columns: 1fr;
  }
}

/* ---------- Agent rows + envvar masks (Phase 9) ---------- */
.dda-agent-tile {
  width: 44px;
  height: 44px;
  border-radius: 11px;
  background: var(--surface-2);
  color: var(--text-faint);
  flex: none;
}
.dda-agent-tile[data-on="true"] {
  background: var(--accent-soft);
  color: var(--accent);
}

.dda-envvar-mask {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}

.dda-brand-asset {
  width: 64px;
  height: 40px;
  border-radius: var(--radius-sm);
  flex: none;
}

.dda-email-ok-banner {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 12px;
  border-radius: 10px;
  background: var(--ok-soft);
  color: var(--ok);
  font-size: 13px;
}

/* ---------- MCP + admin tables (Phase 8) ---------- */
.dda-mcp-row {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border-soft);
}
.dda-mcp-row:last-child {
  border-bottom: none;
}
.dda-mcp-tile {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  color: var(--text-muted);
  flex: none;
}

.dda-row-expanded > td {
  background: var(--surface-2);
}
.dda-admin-addon-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px 10px 30px;
  border-top: 1px solid var(--border-soft);
}
.dda-admin-addon-row:first-child {
  border-top: none;
}
.dda-admin-addon-tile {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: var(--surface);
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: none;
}

/* ---------- Knowledge + approvals + alerts + danger zone (Phase 7) ---------- */
.dda-search-input {
  height: 36px;
  padding: 0 12px;
  border-radius: 9px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-faint);
  max-width: 100%;
}
.dda-search-input input {
  border: none;
  background: transparent;
  outline: none;
  color: var(--text);
  font-size: 13px;
  width: 100%;
  font-family: inherit;
}

.dda-kb-card {
  cursor: pointer;
  transition:
    border-color 0.14s,
    box-shadow 0.14s;
}
.dda-kb-card:hover {
  border-color: var(--accent-line);
  box-shadow: var(--shadow);
}
.dda-kb-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--surface-2);
  flex: none;
}
.dda-kb-mark {
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 3px;
  padding: 0 2px;
}

.dda-approval-row {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;
  background: transparent;
  border-left: 2px solid transparent;
  border-top: none;
  border-right: none;
  width: 100%;
  color: inherit;
  font-family: inherit;
  transition: background 0.12s;
}
.dda-approval-row:hover {
  background: var(--surface-2);
}
.dda-approval-row[data-active="true"] {
  background: var(--surface-2);
  border-left-color: var(--accent);
}
.dda-approval-diff {
  background: var(--surface-2);
  border-radius: 10px;
  overflow: hidden;
  font-family: var(--font-mono);
}
.dda-approval-diff-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-soft);
}
.dda-approval-diff pre {
  margin: 0;
  padding: 12px 14px;
  font-size: 11.5px;
  line-height: 1.7;
  overflow-x: auto;
}

.dda-alert-card {
  transition: border-color 0.12s;
}
.dda-alert-icon {
  width: 42px;
  height: 42px;
  border-radius: 11px;
  flex: none;
}

.dda-danger-row {
  padding: 16px 18px;
  border-top: 1px solid var(--border-soft);
}
.dda-danger-row:first-child {
  border-top: none;
}
.dda-danger-card {
  border-color: var(--danger);
  overflow: hidden;
}

.dda-virtual-scroll {
  border-radius: var(--radius);
}

/* ---------- Cloud + tasks (Phase 6) ---------- */
.dda-provider-tile {
  width: 42px;
  height: 42px;
  border-radius: 11px;
  border: 1px solid var(--border);
  font-weight: 800;
  font-size: 11px;
  color: white;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
  flex: none;
  letter-spacing: 0.05em;
}

.dda-cloud-stat-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--accent);
  flex: none;
}
.dda-cloud-policy {
  padding: 10px 12px;
  background: var(--surface-2);
  border-radius: 9px;
  border: 1px solid var(--border-soft);
}

.dda-task-icon {
  width: 42px;
  height: 42px;
  border-radius: 11px;
  flex: none;
}

.dda-cost-trend {
  position: relative;
}
.dda-cost-budget-line {
  position: absolute;
  left: 0;
  right: 0;
  border-top: 1.5px dashed var(--warn);
  opacity: 0.7;
}

/* ---------- Pipeline + activity + chat (Phase 5) ---------- */
.dda-pipeline-stage {
  flex: 1 1 auto;
  min-width: 100px;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  align-items: center;
}

.dda-activity-row {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border-soft);
}
.dda-activity-row:last-child {
  border-bottom: none;
}

.dda-config-row {
  padding: 6px 0;
}

/* When a chat page is inside .dda-page-wrap, drop the wrap's padding entirely
   so the chat can fill 100% of .dda-main without any viewport math. Modern
   :has() gives us this per-route override without touching other pages.
   Matches through the .dda-chat-shell wrapper the threaded layout adds. */
.dda-main:has(.dda-chat-page) {
  overflow: hidden;
}
.dda-page-wrap:has(.dda-chat-page) {
  padding: 0;
  height: 100%;
  max-width: none;
  overflow: hidden;
}
.dda-chat-page {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
.dda-chat-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  flex: none;
  gap: 12px;
}
.dda-chat-head-icon {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  background: var(--accent-soft);
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.dda-chat-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.dda-chat-inner {
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 820px;
  margin: 0 auto;
}
.dda-chat-row {
  align-items: flex-start;
}
.dda-chat-user-bubble {
  padding: 11px 15px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  border-radius: 12px;
  max-width: 76%;
  font-size: 13.5px;
  line-height: 1.5;
}
.dda-chat-agent-tile {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--accent-soft);
  color: var(--accent);
  flex: none;
}
.dda-chat-agent-bubble {
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.55;
}
.dda-chat-plan-row {
  padding: 9px 10px;
  border-radius: 8px;
}
.dda-chat-plan-icon {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: var(--surface-2);
  color: var(--accent);
  flex: none;
}
.dda-chat-code {
  overflow: hidden;
  font-size: 12px;
}
.dda-chat-code-head {
  padding: 8px 12px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-soft);
}
.dda-chat-code-body {
  margin: 0;
  padding: 12px 14px;
  overflow-x: auto;
  line-height: 1.6;
  color: var(--text-muted);
  white-space: pre;
}
.dda-chat-composer {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px 12px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow-sm);
  transition:
    border-color 0.15s ease,
    box-shadow 0.15s ease;
}
.dda-chat-composer:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}
.dda-chat-composer-input {
  border: none;
  background: transparent;
  outline: none;
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  font-family: inherit;
  width: 100%;
  min-height: 24px;
  max-height: 200px;
  resize: none;
  overflow-y: hidden;
  padding: 4px 6px;
}
.dda-chat-composer-input::placeholder {
  color: var(--text-faint);
}
.dda-chat-composer-actions {
  align-items: center;
}

/* Chat page layout: main pane + right-side history rail. The rail collapses
   by animating grid-template-columns; the rail itself scales/fades so it
   doesn't reflow its content mid-transition. */
.dda-chat-shell {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 0;
  height: 100%;
  min-height: 0;
  overflow: hidden;
  transition: grid-template-columns 0.22s ease;
}
.dda-chat-shell.is-rail-closed {
  grid-template-columns: 1fr 0px;
}
.dda-chat-shell.is-rail-closed > .dda-chat-rail {
  opacity: 0;
  transform: translateX(12px);
  pointer-events: none;
}
.dda-chat-shell > .dda-chat-page {
  min-width: 0;
  min-height: 0;
}
.dda-chat-rail {
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border-soft);
  background: var(--surface-2);
  min-width: 0;
  min-height: 0;
  height: 100%;
  overflow: hidden;
  transition:
    opacity 0.18s ease,
    transform 0.22s ease;
}
.dda-chat-rail-scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.dda-chat-rail-heading {
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-faint);
  padding: 8px 8px 4px;
  margin: 0;
}
.dda-chat-rail-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition:
    background-color 0.12s ease,
    border-color 0.12s ease;
}
.dda-chat-rail-item:hover:not(:disabled) {
  background: var(--surface);
  border-color: var(--border-soft);
}
.dda-chat-rail-item.is-active {
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  border-color: color-mix(in srgb, var(--accent) 35%, transparent);
}
.dda-chat-rail-item:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.dda-chat-rail-item-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.dda-chat-rail-item-meta {
  font-size: 11px;
  color: var(--text-faint);
}
.dda-chat-rail-skel {
  height: 42px;
  border-radius: 8px;
  background: linear-gradient(
    90deg,
    var(--surface) 0%,
    var(--surface-hover) 50%,
    var(--surface) 100%
  );
  background-size: 200% 100%;
  animation: dda-skel 1.4s ease-in-out infinite;
}
@keyframes dda-skel {
  0% {
    background-position: 200% 0;
  }
  100% {
    background-position: -200% 0;
  }
}
@media (max-width: 900px) {
  .dda-chat-shell {
    grid-template-columns: 1fr;
  }
  .dda-chat-rail {
    display: none;
  }
}
.dda-chat-thinking {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.dda-chat-thinking .dot {
  background: var(--accent);
  box-shadow: none;
  animation: pulse 1s infinite;
}
.dda-chat-thinking .dot:nth-child(2) {
  animation-delay: 0.2s;
}
.dda-chat-thinking .dot:nth-child(3) {
  animation-delay: 0.4s;
}

.dda-env-tile {
  flex: 1 1 200px;
  cursor: pointer;
  padding: var(--pad-card);
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--surface-2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition:
    background 0.12s,
    border-color 0.12s;
}
.dda-env-tile[data-active="true"] {
  border-color: var(--accent-line);
  background: var(--accent-soft);
}
.dda-env-tile:hover {
  border-color: var(--accent-line);
}

/* ---------- Plan + billing rows (Phase 4) ---------- */
.dda-plan-card {
  position: relative;
}
.dda-plan-pop {
  position: absolute;
  top: 14px;
  right: 14px;
}
.dda-card-brand {
  width: 44px;
  height: 30px;
  border-radius: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-weight: 800;
  font-size: 11px;
  flex: none;
}

.dda-toggle-row {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border-soft);
  transition: background 0.12s;
}
.dda-toggle-row:last-child {
  border-bottom: none;
}
.dda-toggle-row:hover {
  background: var(--surface-2);
}
.dda-toggle-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  flex: none;
  background: var(--surface-2);
  color: var(--text-muted);
}
.dda-toggle-icon[data-active="true"] {
  background: var(--accent-soft);
  color: var(--accent);
}

.dda-security-row {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-soft);
}
.dda-security-row:last-child {
  border-bottom: none;
}
.dda-security-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: var(--surface-2);
  color: var(--text-muted);
  flex: none;
}

.dda-sub-banner {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  padding: 18px;
  border-radius: 14px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
}
.dda-sub-banner-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: none;
}

.dda-profile-card {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  padding: var(--pad-card);
}
.dda-profile-avatar-edit {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 28px;
  height: 28px;
  border-radius: 99px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--surface);
}

.dda-backup-codes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
}
.dda-backup-code {
  padding: 8px 10px;
  background: var(--surface-2);
  border-radius: 8px;
  border: 1px solid var(--border-soft);
  font-size: 13px;
  text-align: center;
  font-family: var(--font-mono);
}

/* ---------- Project tile + wizard (Phase 3) ---------- */
.dda-project-tile {
  text-decoration: none;
  transition:
    border-color 0.14s,
    box-shadow 0.14s,
    transform 0.08s;
  cursor: pointer;
}
.dda-project-tile:hover {
  border-color: var(--accent-line);
  box-shadow: var(--shadow);
}
.dda-project-tile:active {
  transform: translateY(1px);
}
.dda-project-create {
  border-style: dashed;
  min-height: 240px;
  color: var(--text-faint);
  background: var(--surface);
  cursor: pointer;
  text-decoration: none;
  transition:
    border-color 0.14s,
    background 0.14s;
}
.dda-project-create:hover {
  border-color: var(--accent-line);
  background: var(--surface-2);
}
.dda-project-create-icon {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  background: var(--surface-2);
}

.dda-row-list-row {
  transition: background 0.12s;
}
.dda-row-list-row:hover {
  background: var(--surface-2);
}

.dda-dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 900px) {
  .dda-dash-grid {
    grid-template-columns: 1fr;
  }
}

.dda-stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}

.dda-wizard-gh-card {
  padding: 22px 16px;
  border: 1px dashed var(--border);
  border-radius: 12px;
  background: var(--surface-2);
  text-align: center;
}
.dda-wizard-gh-connected {
  padding: 10px 14px;
  border-radius: 10px;
  background: var(--ok-soft);
  color: var(--ok);
  font-size: 13px;
}
.dda-wizard-repo-row {
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  width: 100%;
  text-align: left;
  font-family: inherit;
  color: inherit;
}
.dda-wizard-repo-row[data-on="true"] {
  border-color: var(--accent-line);
  background: var(--accent-soft);
}
.dda-wizard-check {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  flex: none;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--accent-fg);
}
.dda-wizard-check[data-on="true"] {
  border-color: var(--accent);
  background: var(--accent);
}

.dda-wizard-env-row {
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.dda-wizard-env-row[data-on="true"] {
  border-color: var(--accent-line);
  background: var(--accent-soft);
}
.dda-wizard-iam-note {
  padding: 12px;
  background: var(--info-soft);
  border-radius: 10px;
  color: var(--info);
}
.dda-wizard-summary {
  padding: 14px;
  background: var(--surface-2);
  border: 1px solid var(--border-soft);
  box-shadow: none;
}

/* ---------- Landing page (v1.0) ---------- */
.dda-landing {
  min-height: 100vh;
  background: var(--bg-grad);
  display: flex;
  flex-direction: column;
}

.dda-landing-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px clamp(20px, 4vw, 56px);
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
  background: oklch(0 0 0 / 0);
}
[data-theme="light"] .dda-landing-nav {
  background: oklch(1 0 0 / 0.5);
}

.dda-landing-hero {
  position: relative;
  padding: clamp(48px, 10vw, 120px) clamp(20px, 4vw, 56px) clamp(48px, 8vw, 80px);
  text-align: center;
  overflow: hidden;
}
.dda-landing-hero-glow {
  position: absolute;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: min(1100px, 100%);
  height: 700px;
  background: radial-gradient(
    closest-side,
    oklch(0.62 0.18 var(--accent-h) / 0.22),
    transparent 70%
  );
  pointer-events: none;
  z-index: 0;
}
.dda-landing-hero-inner {
  position: relative;
  z-index: 1;
  max-width: 840px;
  margin: 0 auto;
  align-items: center;
}
.dda-landing-hero h1 {
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 800;
  letter-spacing: -0.035em;
  line-height: 1.05;
  margin-top: 6px;
}
.dda-landing-grad {
  background: linear-gradient(
    120deg,
    oklch(0.72 0.18 var(--accent-h)),
    oklch(0.62 0.16 calc(var(--accent-h) + 40))
  );
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.dda-landing-sub {
  font-size: clamp(15px, 1.6vw, 18px);
  line-height: 1.55;
  max-width: 640px;
  margin: 0 auto;
}
.dda-landing-cta {
  justify-content: center;
  margin-top: 8px;
}
.dda-landing-trust {
  font-size: 12px;
  margin-top: 6px;
  justify-content: center;
}

.dda-landing-section {
  padding: clamp(48px, 8vw, 96px) clamp(20px, 4vw, 56px);
  max-width: 1180px;
  margin: 0 auto;
  width: 100%;
}

.dda-landing-eyebrow {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.dda-landing-features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.dda-landing-feature h3 {
  font-size: 16px;
  letter-spacing: -0.01em;
  margin: 0;
}
.dda-landing-feature p {
  font-size: 13.5px;
  line-height: 1.55;
  margin: 0;
}
.dda-landing-feature-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--accent-soft);
  color: var(--accent);
  flex: none;
}

.dda-landing-how h2 {
  font-size: clamp(28px, 4vw, 40px);
  letter-spacing: -0.02em;
}
.dda-landing-steps {
  list-style: none;
  padding: 0;
  margin: 32px auto 0;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  max-width: 880px;
}
@media (max-width: 720px) {
  .dda-landing-steps {
    grid-template-columns: 1fr;
  }
}
.dda-landing-step {
  display: flex;
  gap: 14px;
  padding: 20px 22px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  align-items: flex-start;
}
.dda-landing-step h4 {
  font-size: 14.5px;
  margin: 2px 0 2px;
}
.dda-landing-step p {
  font-size: 13px;
  line-height: 1.5;
  margin: 0;
}
.dda-landing-step-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 99px;
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 800;

  0%,
  100% {

  }
  50% {
    box-shadow: inset 0 3px 0 0 var(--danger);
  }
}

  width: 9px;
  height: 9px;
  border-radius: 50%;

}

  0%,
  100% {
    opacity: 1;
    transform: scale(1);
    box-shadow: 0 0 0 0 currentColor;

  70% {
    opacity: 0.7;
    transform: scale(1.15);
    box-shadow: 0 0 0 5px transparent;
  }
}
.dda-alert-text {
  min-width: 0;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dda-alert-where {
  font-weight: 400;
  opacity: 0.8;
}
.dda-alert-link {
  flex: none;
  color: inherit;
  text-decoration: underline;
  font-weight: 700;
}
.dda-alert-x {
  flex: none;
  background: none;
  border: none;

  cursor: pointer;
  opacity: 0.7;
  display: inline-flex;
  padding: 2px;
}
.dda-alert-x:hover {

}

  0%,
  100% {

const App = () => {
  const [active, setActive] = useState(() => (location.hash.slice(1) in PAGES ? location.hash.slice(1) : "dashboard"));
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem("dda-wf-theme") || "dark"; } catch (e) { return "dark"; }
  });
  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); try { localStorage.setItem("dda-wf-theme", theme); } catch (e) {} }, [theme]);
  useEffect(() => {
    const on = () => { const id = location.hash.slice(1); if (id in PAGES) setActive(id); };
    window.addEventListener("hashchange", on);
    return () => window.removeEventListener("hashchange", on);
  }, []);
  const select = (id) => { setActive(id); location.hash = id; };
  const Page = PAGES[active].component;
  const isChat = active === "chat";
  return html`
    <div class="dda-shell" style=${{display: "flex", height: "100vh", overflow: "hidden"}}>
      <${Sidebar} active=${active} onSelect=${select} />
      <div class="col grow" style=${{minWidth: 0, minHeight: 0}}>
        <${Topbar} theme=${theme} onToggleTheme=${() => setTheme(theme === "dark" ? "light" : "dark")} />

          <div class="dda-page-wrap col gap-5" style=${isChat ? {maxWidth: "none", padding: 0, height: "100%"} : null}>
            <${Page} />
          </div>
        </main>
      </div>
    </div>`;
};
