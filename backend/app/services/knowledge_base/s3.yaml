# KNOWLEDGE BASE ENTRY: S3 bucket (module + dev/staging/prod). Edit this file, not code.
resource: s3
aliases: [s3, bucket]
title: Amazon S3 bucket
description: An S3 bucket (versioning, encryption, public-access block) as a reusable module across dev/staging/prod.

global_keys: [name, environment, region, state_bucket, state_region]

questions:
  - key: name
    prompt: "What base name for the bucket? (created globally-unique as <name>-<environment>)"
    options: [my-app-data, assets, backups, Custom]
  - key: environment
    prompt: "Which environment should I create now?"
    options: [dev, staging, prod]
  - key: region
    prompt: "Which AWS region?"
    options: [us-east-1, us-west-2, eu-west-1, ap-south-1]
  - key: versioning
    prompt: "Enable object versioning?"
    options: ["Enabled", "Disabled"]
    map: { "Enabled": true, "Disabled": false }
  - key: encryption
    prompt: "Default encryption?"
    options: ["AES256 (SSE-S3)", "aws:kms (SSE-KMS)"]
    map: { "AES256 (SSE-S3)": "AES256", "aws:kms (SSE-KMS)": "aws:kms" }
  - key: block_public
    prompt: "Public access?"
    options: ["Block all public access (recommended)", "Allow public"]
    map: { "Block all public access (recommended)": true, "Allow public": false }

environments:
  list: [dev, staging, prod]
  defaults:
    dev:     { versioning: false, encryption: AES256,    block_public: true }
    staging: { versioning: true,  encryption: AES256,    block_public: true }
    prod:    { versioning: true,  encryption: "aws:kms", block_public: true }

apply:
  run_dir: "terraform/environments/{{environment}}"
  state_key: "s3/{{name}}-{{environment}}"
  name: "{{name}}-{{environment}}"
  background: false

files:
  - path: "terraform/modules/s3/main.tf"
    content: |
      resource "aws_s3_bucket" "this" {
        bucket = var.bucket_name
        tags   = var.tags
      }

      resource "aws_s3_bucket_versioning" "this" {
        bucket = aws_s3_bucket.this.id
        versioning_configuration {
          status = var.versioning ? "Enabled" : "Disabled"
        }
      }

      resource "aws_s3_bucket_server_side_encryption_configuration" "this" {
        bucket = aws_s3_bucket.this.id
        rule {
          apply_server_side_encryption_by_default {
            sse_algorithm = var.encryption
          }
        }
      }

      resource "aws_s3_bucket_public_access_block" "this" {
        bucket                  = aws_s3_bucket.this.id
        block_public_acls       = var.block_public
        block_public_policy     = var.block_public
        ignore_public_acls      = var.block_public
        restrict_public_buckets = var.block_public
      }

  - path: "terraform/modules/s3/variables.tf"
    content: |
      variable "bucket_name" { type = string }
      variable "versioning" {
        type    = bool
        default = true
      }
      variable "encryption" {
        type    = string
        default = "AES256"
      }
      variable "block_public" {
        type    = bool
        default = true
      }
      variable "tags" {
        type    = map(string)
        default = {}
      }

  - path: "terraform/modules/s3/outputs.tf"
    content: |
      output "bucket_id" { value = aws_s3_bucket.this.id }
      output "bucket_arn" { value = aws_s3_bucket.this.arn }

  - path: "terraform/environments/{{env}}/main.tf"
    foreach: env
    content: |
      module "s3" {
        source = "../../modules/s3"

        bucket_name  = var.bucket_name
        versioning   = var.versioning
        encryption   = var.encryption
        block_public = var.block_public
        tags         = var.tags
      }

      output "bucket_id" {
        value = module.s3.bucket_id
      }

      output "bucket_arn" {
        value = module.s3.bucket_arn
      }

  - path: "terraform/environments/{{env}}/providers.tf"
    foreach: env
    content: |
      terraform {
        required_version = ">= 1.3"
        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 5.0"
          }
        }
      }

      provider "aws" {
        region = var.region
      }

  - path: "terraform/environments/{{env}}/variables.tf"
    foreach: env
    content: |
      variable "region" { type = string }
      variable "bucket_name" { type = string }
      variable "versioning" {
        type    = bool
        default = true
      }
      variable "encryption" {
        type    = string
        default = "AES256"
      }
      variable "block_public" {
        type    = bool
        default = true
      }
      variable "tags" {
        type    = map(string)
        default = {}
      }

  - path: "terraform/environments/{{env}}/terraform.tfvars"
    foreach: env
    content: |
      region       = "{{region}}"
      bucket_name  = "{{name}}-{{env}}"
      versioning   = {{versioning}}
      encryption   = "{{encryption}}"
      block_public = {{block_public}}
      tags = {
        Environment = "{{env}}"
        ManagedBy   = "DevOpsAgent"
      }

  - path: "terraform/environments/{{env}}/backend.tf"
    foreach: env
    when: state_bucket
    content: |
      terraform {
        backend "s3" {
          bucket = "{{state_bucket}}"
          key    = "s3/{{name}}-{{env}}/terraform.tfstate"
          region = "{{state_region}}"
        }
      }
