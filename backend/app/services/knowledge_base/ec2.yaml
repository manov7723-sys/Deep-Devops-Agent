# KNOWLEDGE BASE ENTRY: EC2 instance (module + dev/staging/prod). Edit this file, not code.
resource: ec2
aliases: [ec2, instance]
title: Amazon EC2 instance
description: An EC2 instance with a security group, AMI resolved via SSM, as a module across dev/staging/prod.

global_keys: [name, environment, region, ami_ssm_parameter, state_bucket, state_region]

questions:
  - key: name
    prompt: "What base name for the instance? (created as <name>-<environment>)"
    options: [web, api, worker, Custom]
  - key: environment
    prompt: "Which environment should I create now?"
    options: [dev, staging, prod]
  - key: region
    prompt: "Which AWS region?"
    options: [us-east-1, us-west-2, eu-west-1, ap-south-1]
  - key: ami_ssm_parameter
    prompt: "Operating system?"
    options: ["Amazon Linux 2023", "Ubuntu 22.04 LTS", "Ubuntu 24.04 LTS"]
    map:
      "Amazon Linux 2023": "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
      "Ubuntu 22.04 LTS": "/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id"
      "Ubuntu 24.04 LTS": "/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id"
  - key: instance_type
    prompt: "Instance type?"
    options: ["t3.micro (free tier)", "t3.small", "t3.medium", "t3.large", "Custom"]
    map:
      "t3.micro (free tier)": "t3.micro"
      "t3.small": "t3.small"
      "t3.medium": "t3.medium"
      "t3.large": "t3.large"

environments:
  list: [dev, staging, prod]
  defaults:
    dev:     { instance_type: t3.micro,  disk_size: 8 }
    staging: { instance_type: t3.small,  disk_size: 20 }
    prod:    { instance_type: t3.medium, disk_size: 30 }

apply:
  run_dir: "terraform/environments/{{environment}}"
  state_key: "ec2/{{name}}-{{environment}}"
  name: "{{name}}-{{environment}}"
  background: false

files:
  - path: "terraform/modules/ec2/main.tf"
    content: |
      data "aws_ssm_parameter" "ami" {
        name = var.ami_ssm_parameter
      }

      resource "aws_security_group" "this" {
        name        = "${var.name}-sg"
        description = "Security group for ${var.name}"

        ingress {
          description = "SSH"
          from_port   = 22
          to_port     = 22
          protocol    = "tcp"
          cidr_blocks = ["0.0.0.0/0"]
        }

        egress {
          from_port   = 0
          to_port     = 0
          protocol    = "-1"
          cidr_blocks = ["0.0.0.0/0"]
        }

        tags = var.tags
      }

      resource "aws_instance" "this" {
        ami                    = data.aws_ssm_parameter.ami.value
        instance_type          = var.instance_type
        vpc_security_group_ids = [aws_security_group.this.id]

        root_block_device {
          volume_size = var.disk_size
          volume_type = "gp3"
        }

        tags = merge(var.tags, { Name = var.name })
      }

  - path: "terraform/modules/ec2/variables.tf"
    content: |
      variable "name" { type = string }
      variable "ami_ssm_parameter" { type = string }
      variable "instance_type" {
        type    = string
        default = "t3.micro"
      }
      variable "disk_size" {
        type    = number
        default = 8
      }
      variable "tags" {
        type    = map(string)
        default = {}
      }

  - path: "terraform/modules/ec2/outputs.tf"
    content: |
      output "instance_id" { value = aws_instance.this.id }
      output "public_ip" { value = aws_instance.this.public_ip }

  - path: "terraform/environments/{{env}}/main.tf"
    foreach: env
    content: |
      module "ec2" {
        source = "../../modules/ec2"

        name              = var.instance_name
        ami_ssm_parameter = var.ami_ssm_parameter
        instance_type     = var.instance_type
        disk_size         = var.disk_size
        tags              = var.tags
      }

      output "instance_id" {
        value = module.ec2.instance_id
      }

      output "public_ip" {
        value = module.ec2.public_ip
      }

  - path: "terraform/environments/{{env}}/providers.tf"
    foreach: env
    content: |
      terraform {
        required_version = ">= 1.3"
        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 5.0"
          }
        }
      }

      provider "aws" {
        region = var.region
      }

  - path: "terraform/environments/{{env}}/variables.tf"
    foreach: env
    content: |
      variable "region" { type = string }
      variable "instance_name" { type = string }
      variable "ami_ssm_parameter" { type = string }
      variable "instance_type" { type = string }
      variable "disk_size" { type = number }
      variable "tags" {
        type    = map(string)
        default = {}
      }

  - path: "terraform/environments/{{env}}/terraform.tfvars"
    foreach: env
    content: |
      region            = "{{region}}"
      instance_name     = "{{name}}-{{env}}"
      ami_ssm_parameter = "{{ami_ssm_parameter}}"
      instance_type     = "{{instance_type}}"
      disk_size         = {{disk_size}}
      tags = {
        Environment = "{{env}}"
        ManagedBy   = "DevOpsAgent"
      }

  - path: "terraform/environments/{{env}}/backend.tf"
    foreach: env
    when: state_bucket
    content: |
      terraform {
        backend "s3" {
          bucket = "{{state_bucket}}"
          key    = "ec2/{{name}}-{{env}}/terraform.tfstate"
          region = "{{state_region}}"
        }
      }
