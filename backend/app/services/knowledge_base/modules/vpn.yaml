# MODULE KB: Site-to-Site VPN — raw resources (no clean registry module). Wires into a VPC.
type: vpn
title: Site-to-Site VPN
defaults:
  bgp_asn: 65000
  customer_gateway_ip: "203.0.113.1"
raw: |
  resource "aws_vpn_gateway" "{{id}}" {
    vpc_id = {{vpc_id}}
    tags   = { Name = "{{name}}-{{id}}" }
  }

  resource "aws_customer_gateway" "{{id}}_cgw" {
    bgp_asn    = {{bgp_asn}}
    ip_address = "{{customer_gateway_ip}}"
    type       = "ipsec.1"
  }

  resource "aws_vpn_connection" "{{id}}" {
    vpn_gateway_id      = aws_vpn_gateway.{{id}}.id
    customer_gateway_id = aws_customer_gateway.{{id}}_cgw.id
    type                = "ipsec.1"
    static_routes_only  = true
  }
wires:
  vpc:
    vpc_id: "{{source.vpc_id}}"
outputs:
  vpn_connection_id: "aws_vpn_connection.{{id}}.id"
