# MODULE KB: RDS database — registry module. Wires into VPC subnets + a security group.
type: rds
title: RDS database
source: terraform-aws-modules/rds/aws
version: "~> 6.0"
defaults:
  instance_class: db.t3.micro
  allocated_storage: 20
config:
  identifier: '"{{name}}-{{id}}"'
  engine: '"mysql"'
  engine_version: '"8.0"'
  family: '"mysql8.0"'
  major_engine_version: '"8.0"'
  instance_class: '"{{instance_class}}"'
  allocated_storage: "{{allocated_storage}}"
  db_name: '"appdb"'
  username: '"admin"'
  manage_master_user_password: "true"
  create_db_subnet_group: "true"
  skip_final_snapshot: "true"
provides:
  endpoint: "module.{{id}}.db_instance_endpoint"
wires:
  vpc:                       # connect: {vpc: <vpc-id>}
    subnet_ids: "{{source.private_subnets}}"
  sg:                        # connect: {sg: <sg-id>}
    vpc_security_group_ids: "[{{source.security_group_id}}]"
outputs:
  endpoint: "module.{{id}}.db_instance_endpoint"
