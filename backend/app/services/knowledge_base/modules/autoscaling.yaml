# MODULE KB: Auto Scaling Group — registry module. Wires into a VPC + security group.
type: autoscaling
title: Auto Scaling Group
source: terraform-aws-modules/autoscaling/aws
version: "~> 8.0"
data: |
  data "aws_ssm_parameter" "{{id}}_ami" {
    name = "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
  }
defaults:
  instance_type: t3.micro
  min_size: 1
  max_size: 3
  desired_capacity: 2
config:
  name: '"{{name}}-{{id}}"'
  min_size: "{{min_size}}"
  max_size: "{{max_size}}"
  desired_capacity: "{{desired_capacity}}"
  image_id: "data.aws_ssm_parameter.{{id}}_ami.value"
  instance_type: '"{{instance_type}}"'
provides:
  asg_name: "module.{{id}}.autoscaling_group_name"
wires:
  vpc:
    vpc_zone_identifier: "{{source.private_subnets}}"
  sg:
    security_groups: "[{{source.security_group_id}}]"
outputs:
  asg_name: "module.{{id}}.autoscaling_group_name"
