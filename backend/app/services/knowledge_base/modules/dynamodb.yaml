# MODULE KB: DynamoDB table — registry module.
type: dynamodb
title: DynamoDB table
source: terraform-aws-modules/dynamodb-table/aws
version: "~> 4.0"
config:
  name: '"{{name}}-{{id}}"'
  billing_mode: '"PAY_PER_REQUEST"'
  hash_key: '"id"'
  attributes: '[{ name = "id", type = "S" }]'
provides:
  table_arn: "module.{{id}}.dynamodb_table_arn"
outputs:
  table_arn: "module.{{id}}.dynamodb_table_arn"
