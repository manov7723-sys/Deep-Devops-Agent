# DeepAgent default values.
# Each repo committed by `ensure-chart` ships these defaults. Agent edits
# image.tag on every deploy; the rest stays stable per env.

# ─── Image ────────────────────────────────────────────────────────────
image:
  # Container image repository (e.g. ECR / GCR / GHCR / DockerHub URL).
  repository: ghcr.io/example/app
  # Set on every deploy. Agent overrides via `--set image.tag=<sha>`.
  tag: latest
  pullPolicy: IfNotPresent

# Optional pull secret (e.g. for private registries). Leave empty for public.
imagePullSecrets: []

# ─── Naming ───────────────────────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

# ─── Replicas + resources ────────────────────────────────────────────
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ─── Service ─────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  # The container port your app actually listens on.
  targetPort: 3000

# ─── Ingress ─────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ─── Probes ──────────────────────────────────────────────────────────
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# ─── Pod env ─────────────────────────────────────────────────────────
# App env vars — agent extends this per-env.
env: []
# - name: NODE_ENV
#   value: production

# Env vars sourced from a Secret/ConfigMap.
envFrom: []

# ─── Scheduling / annotations ────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

# ─── Service account ─────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""
